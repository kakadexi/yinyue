<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡卡的西 · 终极版</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<style>
body{background:#e8f0ff;font-family:sans-serif}
.glass{background:rgba(255,255,255,.6);padding:15px;border-radius:20px;margin-bottom:15px}
.song{padding:10px;border-bottom:1px solid #eee;cursor:pointer}
.song:hover{background:#f5f7ff}
</style>
</head>

<body>
<div id="app" class="max-w-xl mx-auto p-4">

<h1 class="text-2xl font-bold mb-4">🎵 卡卡的西（终极版）</h1>

<div class="glass">
<input v-model="keyword" @keyup.enter="searchMusic"
placeholder="搜索歌曲"
class="w-full p-2 rounded border">
</div>

<div class="glass" v-if="currentSong">
<h2>{{currentSong.name}}</h2>
<p>{{currentSong.artist}}</p>
<audio ref="audio" controls class="w-full mt-2"></audio>
</div>

<div class="glass">
<div v-for="(s,i) in songs" :key="i" class="song" @click="play(s)">
{{s.name}} - {{s.artist}}
</div>
</div>

</div>

<script>
const {createApp,ref} = Vue;

createApp({
setup(){

const keyword=ref('');
const songs=ref([]);
const currentSong=ref(null);
const audio=ref(null);

// ✅ 缓存
const cache=new Map();

// ✅ 音源池
const SOURCES=[

{
name:'kuwo',
handler:async(song)=>{
try{
const r=await axios.get('https://www.kuwo.cn/api/www/search/searchMusicBykeyWord',{
params:{key:song.name+' '+song.artist,pn:1,rn:1},
headers:{Referer:'https://www.kuwo.cn/'}
});
const s=r.data?.data?.list?.[0];
if(!s)return null;

const p=await axios.get('https://www.kuwo.cn/api/v1/www/music/playUrl',{
params:{mid:s.rid},
headers:{Referer:'https://www.kuwo.cn/'}
});
return p.data?.data?.url||null;
}catch{return null;}
}
},

{
name:'qq',
handler:async(song)=>{
if(!song.mid)return null;
return `https://music.nxinxz.com/kgqq/tx.php?id=${song.mid}&type=mp3`;
}
},

{
name:'netease',
handler:async(song)=>{
return `https://music.163.com/song/media/outer/url?id=186016.mp3`;
}
}

];

// ✅ 检测
const test=(url)=>{
return new Promise(res=>{
const a=new Audio();
a.src=url;
a.oncanplay=()=>res(true);
a.onerror=()=>res(false);
setTimeout(()=>res(false),3000);
});
};

// ✅ 核心
const getUrl=async(song)=>{

if(cache.has(song.name)) return cache.get(song.name);

for(let s of SOURCES){
let url=await s.handler(song);
if(!url) continue;

let ok=await test(url);
if(ok){
cache.set(song.name,url);
console.log('使用音源:',s.name);
return url;
}
}

return 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
};

// ✅ 播放
const play=async(song)=>{
currentSong.value=song;

const url=await getUrl(song);

audio.value.src=url;
audio.value.play().catch(()=>{
alert('点击播放');
});
};

// ✅ 搜索（用你原来的QQ搜索）
const searchMusic=async()=>{
const res=await axios.post(
'https://u.y.qq.com/cgi-bin/musicu.fcg',
{
req_1:{
method:"DoSearchForQQMusicDesktop",
module:"music.search.SearchCgiService",
param:{query:keyword.value,page_num:1,num_per_page:20}
}
}
);

const list=res.data?.req_1?.data?.body?.song?.list||[];

songs.value=list.map(i=>({
name:i.name,
artist:i.singer.map(s=>s.name).join(','),
mid:i.mid
}));
};

return{keyword,songs,searchMusic,play,currentSong,audio};
}
}).mount('#app');
</script>
</body>
</html>
