<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>卡卡的西 · 极简播放器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #000; background: radial-gradient(circle at 20% 30%, #1a1a2e, #000); min-height: 100vh; }
        .glass-card { background: rgba(20,20,30,0.7); backdrop-filter: blur(25px); border-radius: 28px; border: 0.5px solid rgba(255,255,255,0.1); }
        .song-item { transition: all 0.2s; cursor: pointer; }
        .song-item:active { background: rgba(255,255,255,0.08); transform: scale(0.99); }
        .playing { background: rgba(0,200,255,0.12); border-left: 3px solid #00c6ff; }
        .ctrl-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; }
        .ctrl-btn:active { transform: scale(0.94); background: rgba(255,255,255,0.2); }
        .play-btn { background: #fff; color: #000; }
        .play-btn:active { background: #ddd; }
        .segment { padding: 6px 16px; border-radius: 40px; font-size: 0.85rem; background: rgba(255,255,255,0.1); color: #ccc; transition: 0.2s; cursor: pointer; }
        .segment-active { background: #fff; color: #000; }
        .tag { background: rgba(255,255,255,0.08); padding: 6px 14px; border-radius: 40px; font-size: 0.85rem; cursor: pointer; }
        .tag:active { background: rgba(255,255,255,0.2); transform: scale(0.96); }
        .search-input { background: rgba(255,255,255,0.08); border: none; border-radius: 30px; padding: 12px 20px 12px 44px; color: white; font-size: 1rem; outline: none; width: 100%; }
        .search-input:focus { background: rgba(255,255,255,0.15); }
        .loader { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        audio { width: 100%; border-radius: 60px; margin-top: 12px; background: rgba(0,0,0,0.6); }
        .toast { background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-radius: 40px; padding: 8px 20px; color: white; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    </style>
</head>
<body>
<div id="app" class="max-w-3xl mx-auto px-5 py-8">
    <!-- 头部 -->
    <div class="mb-8">
        <h1 class="text-4xl font-bold text-white tracking-tight">卡卡的西</h1>
        <p class="text-white/40 text-sm mt-1">极简 · 自动连播</p>
    </div>

    <!-- 搜索卡片 -->
    <div class="glass-card p-5 mb-6">
        <div class="flex justify-between items-center mb-4">
            <span class="text-white/70 text-sm">音质</span>
            <div class="flex gap-2">
                <span v-for="q in qualities" :key="q.value" @click="currentQuality = q.value; if(currentSong) refreshUrl()" class="segment" :class="currentQuality === q.value ? 'segment-active' : ''">{{ q.label }}</span>
            </div>
        </div>
        <div class="relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-white/40 text-sm"></i>
            <input v-model="keyword" @keyup.enter="searchMusic" type="text" placeholder="歌曲或歌手" class="search-input">
        </div>
        <div class="flex gap-2 mt-4 overflow-x-auto pb-1">
            <span v-for="tag in quickTags" :key="tag" @click="keyword = tag; searchMusic()" class="tag whitespace-nowrap">🎤 {{ tag }}</span>
        </div>
    </div>

    <!-- 当前播放区域 -->
    <div v-if="currentSong" class="glass-card p-5 mb-6">
        <div class="flex gap-4">
            <img :src="currentSong.cover" class="w-20 h-20 rounded-2xl object-cover shadow" @error="currentSong.cover = defaultCover">
            <div class="flex-1 min-w-0">
                <div class="text-white/50 text-xs uppercase">正在播放</div>
                <div class="text-white font-semibold text-lg truncate">{{ currentSong.name }}</div>
                <div class="text-white/40 text-sm truncate">{{ currentSong.artist }}</div>
            </div>
        </div>
        <!-- 原生audio控件（可见但美化） -->
        <audio ref="audioPlayer" controls class="mt-3" @ended="onAudioEnded" @error="onPlayError"></audio>
        <div class="flex justify-center gap-5 mt-3">
            <div class="ctrl-btn" @click="prevTrack"><i class="fas fa-backward-step text-white text-base"></i></div>
            <div class="ctrl-btn play-btn" @click="togglePlayPause"><i :class="isPlaying ? 'fas fa-pause' : 'fas fa-play'" class="text-black text-base"></i></div>
            <div class="ctrl-btn" @click="nextTrack"><i class="fas fa-forward-step text-white text-base"></i></div>
            <div class="ctrl-btn" @click="cycleMode"><i class="fas" :class="modeIcon" :class="{'text-cyan-400': playMode !== 'order'}"></i></div>
        </div>
        <div v-if="playError" class="text-amber-300 text-xs text-center mt-2">{{ playError }} <button @click="refreshUrl" class="underline">重试</button></div>
    </div>

    <!-- 歌曲列表 -->
    <div class="glass-card overflow-hidden">
        <div class="px-5 py-3 border-b border-white/10 flex justify-between">
            <span class="text-white font-medium">播放列表</span>
            <span class="text-white/30 text-xs">{{ songs.length }}首</span>
        </div>
        <div ref="listContainer" class="max-h-[500px] overflow-y-auto custom-scroll">
            <div v-if="loading && !songs.length" class="py-16 text-center"><div class="loader mx-auto"></div><p class="text-white/40 text-sm mt-2">加载中...</p></div>
            <div v-else-if="!songs.length && !loading" class="py-16 text-center"><i class="fas fa-headphones text-white/20 text-4xl mb-2"></i><p class="text-white/40 text-sm">搜索歌曲开始聆听</p></div>
            <div v-else>
                <div v-for="(song, idx) in songs" :key="song.id" @click="playSong(song, idx)" class="song-item px-5 py-3 flex items-center gap-3 border-b border-white/5" :class="{'playing': currentSong && currentSong.id === song.id}">
                    <div class="text-white/40 w-7 text-sm">{{ idx+1 }}</div>
                    <img :src="song.cover" class="w-10 h-10 rounded-lg object-cover" @error="song.cover = defaultCover">
                    <div class="flex-1 min-w-0">
                        <div class="text-white font-medium truncate">{{ song.name }}</div>
                        <div class="text-white/40 text-xs truncate">{{ song.artist }}</div>
                    </div>
                    <div class="text-white/30 text-xs hidden sm:block">{{ song.duration }}</div>
                    <i class="fas fa-play text-white/30 text-xs"></i>
                </div>
                <div class="py-4 text-center">
                    <div v-if="isLoadingMore" class="loader w-5 h-5 mx-auto"></div>
                    <button v-else-if="hasMore && !loading" @click="loadMore" class="text-white/40 text-sm py-2 px-4 rounded-full bg-white/5 hover:bg-white/10">加载更多</button>
                    <div v-if="!hasMore && songs.length" class="text-white/20 text-xs py-2">—— 到底了 ——</div>
                </div>
            </div>
        </div>
    </div>
    <div class="text-center text-white/20 text-[10px] mt-6">卡卡的西 · 点击即播 · 自动连播</div>

    <!-- Toast -->
    <transition name="fade"><div v-if="msg" class="fixed bottom-6 left-1/2 -translate-x-1/2 toast z-50">{{ msg }}</div></transition>
</div>

<script>
    const { createApp, ref, onMounted, onUnmounted, watch, computed } = Vue;
    const PROXY = 'https://proxy.api.030101.xyz/';
    const proxyPost = async (url, data, headers = {}) => {
        const res = await axios.post(PROXY + url, data, { headers: { 'User-Agent': 'Mozilla/5.0', 'Content-Type': 'application/json', ...headers }, timeout: 15000 });
        return res.data;
    };

    createApp({
        setup() {
            const keyword = ref('');
            const songs = ref([]);
            const loading = ref(false);
            const isLoadingMore = ref(false);
            const currentSong = ref(null);
            const playError = ref('');
            const msg = ref('');
            const currentQuality = ref('320k');
            const audioPlayer = ref(null);
            const isPlaying = ref(false);
            const playMode = ref('order'); // order, random, repeat-one
            const currentIndex = ref(-1);
            const currentPage = ref(1);
            const hasMore = ref(true);
            const pageSize = 30;
            const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';
            const qualities = [{ value: '128k', label: '标准' },{ value: '320k', label: '高品质' },{ value: 'flac', label: '无损' }];
            const quickTags = ['周杰伦', '林俊杰', '陈奕迅', '邓紫棋', '稻香', '夜曲', '孤勇者', '海阔天空'];
            const listContainer = ref(null);
            
            const modeIcon = computed(() => {
                if (playMode.value === 'random') return 'fa-random';
                if (playMode.value === 'repeat-one') return 'fa-repeat';
                return 'fa-repeat';
            });
            const modeText = computed(() => {
                if (playMode.value === 'order') return '顺序';
                if (playMode.value === 'random') return '随机';
                return '单曲';
            });
            
            const showMsg = (text) => { msg.value = text; setTimeout(() => msg.value = '', 2000); };
            
            // 获取真实播放链接
            const getPlayUrl = async (songmid) => {
                if (!songmid) return null;
                try {
                    const map = { '128k': 'standard', '320k': 'exhigh', 'flac': 'lossless' };
                    const level = map[currentQuality.value];
                    return `https://music.nxinxz.com/kgqq/tx.php?id=${songmid}&level=${level}&type=mp3`;
                } catch { return null; }
            };
            const getNeteaseFallback = (name) => {
                const map = { '晴天': '186016', '稻香': '186004', '夜曲': '186038', '七里香': '186008', '告白气球': '418603077', '海阔天空': '346334', '起风了': '1330348068', '孤勇者': '1901371647' };
                for (let [k, id] of Object.entries(map)) if (name.includes(k)) return `https://music.163.com/song/media/outer/url?id=${id}.mp3`;
                return null;
            };
            const fetchSongUrl = async (song) => {
                let url = null;
                if (song.mid) url = await getPlayUrl(song.mid);
                if (!url) url = getNeteaseFallback(song.name);
                if (!url) url = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
                return url;
            };
            
            // 核心播放函数（点击歌曲时调用）
            const playSong = async (song, idx) => {
                if (!song) return;
                currentSong.value = song;
                currentIndex.value = idx;
                playError.value = '';
                const url = await fetchSongUrl(song);
                if (audioPlayer.value) {
                    audioPlayer.value.src = url;
                    audioPlayer.value.load();
                    // 直接播放（利用用户点击手势）
                    const playPromise = audioPlayer.value.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => { isPlaying.value = true; }).catch(err => {
                            console.warn(err);
                            playError.value = '播放失败，请手动点击播放按钮';
                            showMsg('点击播放按钮');
                        });
                    }
                }
                showMsg(`♬ ${song.name}`);
            };
            
            // 下一首逻辑
            const getNextIndex = () => {
                if (songs.value.length === 0) return -1;
                if (playMode.value === 'random') {
                    if (songs.value.length === 1) return 0;
                    let newIdx = Math.floor(Math.random() * songs.value.length);
                    while (newIdx === currentIndex.value) newIdx = Math.floor(Math.random() * songs.value.length);
                    return newIdx;
                } else if (playMode.value === 'repeat-one') {
                    return currentIndex.value;
                } else {
                    return (currentIndex.value + 1) % songs.value.length;
                }
            };
            
            const nextTrack = async () => {
                if (songs.value.length === 0) return;
                if (playMode.value === 'repeat-one') {
                    if (audioPlayer.value && currentSong.value) {
                        audioPlayer.value.currentTime = 0;
                        audioPlayer.value.play().catch(e => console.warn(e));
                    }
                    return;
                }
                const nextIdx = getNextIndex();
                if (nextIdx !== -1 && songs.value[nextIdx]) {
                    await playSong(songs.value[nextIdx], nextIdx);
                }
            };
            
            const prevTrack = async () => {
                if (songs.value.length === 0) return;
                let prevIdx;
                if (playMode.value === 'random') prevIdx = Math.floor(Math.random() * songs.value.length);
                else if (playMode.value === 'repeat-one') prevIdx = currentIndex.value;
                else prevIdx = (currentIndex.value - 1 + songs.value.length) % songs.value.length;
                if (prevIdx >= 0 && songs.value[prevIdx]) await playSong(songs.value[prevIdx], prevIdx);
            };
            
            const onAudioEnded = () => {
                // 自动连播核心
                nextTrack();
            };
            
            const togglePlayPause = () => {
                if (!audioPlayer.value) return;
                if (isPlaying.value) audioPlayer.value.pause();
                else audioPlayer.value.play().catch(e => console.warn(e));
            };
            
            const refreshUrl = async () => {
                if (currentSong.value) {
                    const url = await fetchSongUrl(currentSong.value);
                    if (audioPlayer.value) {
                        const wasPlaying = !audioPlayer.value.paused;
                        audioPlayer.value.src = url;
                        audioPlayer.value.load();
                        if (wasPlaying) audioPlayer.value.play().catch(e => console.warn(e));
                    }
                }
            };
            
            const onPlayError = () => { playError.value = '播放出错，尝试切换音质'; };
            const cycleMode = () => {
                if (playMode.value === 'order') playMode.value = 'random';
                else if (playMode.value === 'random') playMode.value = 'repeat-one';
                else playMode.value = 'order';
                showMsg(`播放模式: ${modeText.value}`);
            };
            
            // 绑定音频事件，同步播放状态
            const bindEvents = () => {
                if (!audioPlayer.value) return;
                audioPlayer.value.addEventListener('play', () => { isPlaying.value = true; });
                audioPlayer.value.addEventListener('pause', () => { isPlaying.value = false; });
                audioPlayer.value.addEventListener('ended', onAudioEnded);
            };
            
            // 搜索相关
            const fetchSongs = async (query, page) => {
                const postData = {
                    req_1: {
                        method: "DoSearchForQQMusicDesktop",
                        module: "music.search.SearchCgiService",
                        param: { num_per_page: pageSize, page_num: page, query: query, search_type: 0 }
                    }
                };
                const data = await proxyPost('https://u.y.qq.com/cgi-bin/musicu.fcg', postData, { 'Referer': 'https://y.qq.com' });
                const list = data?.req_1?.data?.body?.song?.list || [];
                const formatted = list.map(item => ({
                    id: item.id, mid: item.mid, name: item.name,
                    artist: item.singer?.map(s => s.name).join(', ') || '未知歌手',
                    cover: item.album?.mid ? `https://y.gtimg.cn/music/photo_new/T002R300x300M000${item.album.mid}.jpg` : defaultCover,
                    duration: item.interval ? `${Math.floor(item.interval/60)}:${String(item.interval%60).padStart(2,'0')}` : '03:30'
                }));
                return { list: formatted, hasMore: list.length === pageSize };
            };
            
            const searchMusic = async () => {
                if (!keyword.value.trim()) { showMsg('输入歌手或歌曲'); return; }
                loading.value = true;
                currentPage.value = 1;
                hasMore.value = true;
                songs.value = [];
                currentSong.value = null;
                if (audioPlayer.value) audioPlayer.value.pause();
                try {
                    const { list, hasMore: more } = await fetchSongs(keyword.value, 1);
                    songs.value = list;
                    hasMore.value = more;
                    if (list.length === 0) showMsg('没有找到歌曲');
                    else showMsg(`找到 ${list.length} 首`);
                    if (list.length) currentPage.value = 2;
                } catch (err) {
                    showMsg('搜索失败');
                } finally {
                    loading.value = false;
                }
            };
            
            const loadMore = async () => {
                if (isLoadingMore.value || !hasMore.value || loading.value) return;
                isLoadingMore.value = true;
                try {
                    const { list, hasMore: more } = await fetchSongs(keyword.value, currentPage.value);
                    songs.value = [...songs.value, ...list];
                    hasMore.value = more;
                    if (list.length) currentPage.value++;
                } catch (err) {
                    showMsg('加载更多失败');
                } finally {
                    isLoadingMore.value = false;
                }
            };
            
            // 滚动加载
            const handleScroll = () => {
                if (!listContainer.value) return;
                const { scrollTop, clientHeight, scrollHeight } = listContainer.value;
                if (scrollTop + clientHeight >= scrollHeight - 100) {
                    if (hasMore.value && !isLoadingMore.value && !loading.value && keyword.value.trim()) loadMore();
                }
            };
            
            onMounted(() => {
                if (listContainer.value) listContainer.value.addEventListener('scroll', handleScroll);
                if (audioPlayer.value) bindEvents();
            });
            onUnmounted(() => {
                if (listContainer.value) listContainer.value.removeEventListener('scroll', handleScroll);
            });
            watch(audioPlayer, (val) => { if (val) bindEvents(); });
            
            return {
                keyword, songs, loading, isLoadingMore, currentSong, playError, msg, currentQuality,
                qualities, defaultCover, quickTags, hasMore, listContainer, audioPlayer, isPlaying,
                playMode, modeIcon, modeText,
                searchMusic, loadMore, playSong, togglePlayPause, nextTrack, prevTrack,
                cycleMode, onAudioEnded, refreshUrl, onPlayError
            };
        }
    }).mount('#app');
</script>
</body>
</html>
