<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨卡卡的西✨临时邮箱 · 灵动玻璃质感</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glass-bg-light: rgba(255, 255, 255, 0.28);
            --glass-bg-dark: rgba(20, 28, 45, 0.55);
            --glass-border-light: rgba(255, 255, 255, 0.5);
            --glass-border-dark: rgba(255, 255, 255, 0.12);
            --text-light-primary: #1e2a3a;
            --text-light-secondary: #2c3e50;
            --text-dark-primary: #f0f3fa;
            --text-dark-secondary: #cbd5e6;
            --accent-gold: #ffc857;
            --accent-glow: #ffb347;
            --btn-bg: rgba(255, 255, 255, 0.2);
            --btn-hover: rgba(255, 255, 255, 0.35);
            --shadow-sm: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 45px rgba(0, 0, 0, 0.2);
            --backdrop-blur: blur(14px) saturate(180%);
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(210, 225, 245, 0.7), rgba(170, 195, 230, 0.5)),
                        repeating-linear-gradient(45deg, rgba(255,255,240,0.02) 0px, rgba(255,255,240,0.02) 2px, transparent 2px, transparent 8px);
            min-height: 100vh;
            transition: all 0.3s ease;
            backdrop-filter: blur(1px);
        }

        /* 深色模式灵动背景 */
        body.dark {
            background: radial-gradient(circle at 70% 30%, rgba(25, 35, 60, 0.9), rgba(10, 15, 30, 0.95)),
                        repeating-linear-gradient(135deg, rgba(100,120,160,0.08) 0px, rgba(100,120,160,0.08) 1px, transparent 1px, transparent 10px);
        }

        /* 全局玻璃容器通用样式 */
        .glass-card {
            background: var(--glass-bg-light);
            backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--glass-border-light);
            border-radius: 2rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.25s ease;
        }

        body.dark .glass-card {
            background: var(--glass-bg-dark);
            border-color: var(--glass-border-dark);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
            padding: 85px 20px 40px;
        }

        /* 头部卡片 (灵动玻璃) */
        .search-header {
            background: var(--glass-bg-light);
            backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--glass-border-light);
            border-radius: 2rem;
            padding: 32px 32px 36px;
            margin-bottom: 28px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: all 0.25s;
        }

        body.dark .search-header {
            background: var(--glass-bg-dark);
            border-color: var(--glass-border-dark);
        }

        /* 名字渐变核心效果 ✨卡卡的西✨ */
        .cute-name {
            display: inline-block;
            background: linear-gradient(135deg, #FFD966, #FFB347, #FF6A5C, #C84B31);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: shimmer 3s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            color: var(--text-light-primary);
        }

        body.dark h1 {
            color: #f1f5ff;
        }

        h1 .star {
            font-size: 2rem;
            filter: drop-shadow(0 0 4px rgba(255,200,100,0.6));
        }

        .avatar {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            margin: 12px auto 12px;
            border: 2px solid rgba(255,255,245,0.7);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
            object-fit: cover;
            background: rgba(255,255,240,0.3);
            backdrop-filter: blur(4px);
        }

        .mail-display {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(6px);
            padding: 14px 26px;
            border-radius: 60px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 20px auto;
            display: inline-block;
            border: 1px solid rgba(255,255,240,0.6);
            color: var(--text-light-primary);
            transition: 0.2s;
        }

        body.dark .mail-display {
            background: rgba(0, 0, 0, 0.35);
            border-color: rgba(255,255,255,0.2);
            color: #eef4ff;
        }

        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            min-width: 128px;
            padding: 12px 28px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: var(--btn-bg);
            backdrop-filter: blur(4px);
            color: var(--text-light-primary);
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,245,0.5);
        }

        body.dark .btn {
            color: #eef2ff;
            background: rgba(30, 40, 65, 0.6);
            border-color: rgba(255,255,255,0.15);
        }

        .btn-p {
            background: linear-gradient(105deg, #2c5282, #1e3a5f);
            color: white;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        body.dark .btn-p {
            background: linear-gradient(105deg, #3b6ea0, #1e3c72);
        }

        .btn:active { transform: scale(0.97); }
        .btn-p:hover, .btn-s:hover { filter: brightness(1.03); transform: translateY(-2px); }

        /* 收件箱卡片 */
        .results-container {
            background: var(--glass-bg-light);
            backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--glass-border-light);
            border-radius: 2rem;
            padding: 28px 24px;
            min-height: 360px;
            box-shadow: var(--shadow-sm);
        }
        body.dark .results-container {
            background: var(--glass-bg-dark);
            border-color: var(--glass-border-dark);
        }

        .results-title {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-light-secondary);
            margin-bottom: 20px;
            padding-left: 12px;
            border-left: 4px solid #ffb347;
        }
        body.dark .results-title {
            color: var(--text-dark-secondary);
        }

        .msg-item {
            background: rgba(245, 248, 255, 0.65);
            backdrop-filter: blur(2px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 18px;
            border: 1px solid rgba(255,255,245,0.5);
            transition: 0.2s;
            cursor: pointer;
        }
        body.dark .msg-item {
            background: rgba(25, 35, 55, 0.6);
            border-color: rgba(255,255,255,0.1);
        }
        .msg-item:hover {
            transform: translateY(-3px);
            border-color: #ffb347;
            background: rgba(255,250,225,0.7);
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.2);
        }
        body.dark .msg-item:hover {
            background: rgba(45, 60, 90, 0.7);
            border-color: #f0a34b;
        }

        .msg-meta {
            font-size: 0.7rem;
            font-weight: bold;
            color: #d97a1c;
            margin-bottom: 6px;
        }
        body.dark .msg-meta { color: #f6ad55; }

        .msg-subject {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text-light-primary);
        }
        body.dark .msg-subject { color: #f0f3fc; }

        /* 弹窗玻璃质感 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: rgba(250, 250, 255, 0.92);
            backdrop-filter: blur(24px);
            width: 100%;
            max-width: 680px;
            height: 85vh;
            border-radius: 36px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,245,0.8);
            box-shadow: var(--shadow-lg);
        }
        body.dark .modal-content {
            background: rgba(18, 25, 45, 0.92);
            border-color: rgba(255,255,245,0.2);
        }
        .modal-header {
            padding: 20px 28px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        body.dark .modal-header {
            border-bottom-color: rgba(255,255,255,0.1);
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            background: #ffffffea;
            color: #1f2a3e;
            border-radius: 0 0 32px 32px;
        }
        body.dark .modal-body {
            background: #fefef7;
            color: #1a2636;
        }
        .close-btn {
            background: rgba(0,0,0,0.08);
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }
        .close-btn:hover { background: rgba(0,0,0,0.15); }

        /* 主题切换按钮重新设计融入玻璃 */
        .theme-toggle {
            position: fixed;
            top: 22px;
            right: 22px;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            background: var(--glass-bg-light);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 150;
            font-size: 1.6rem;
            transition: 0.2s;
            box-shadow: var(--shadow-sm);
        }
        body.dark .theme-toggle {
            background: var(--glass-bg-dark);
            border-color: var(--glass-border-dark);
        }

        @media (max-width: 640px) {
            .container { padding-top: 70px; }
            .search-header, .results-container { border-radius: 1.5rem; padding: 24px 18px; }
            h1 { font-size: 1.8rem; }
            .mail-display { font-size: 0.85rem; word-break: break-all; max-width: 95%; }
        }
    </style>
</head>
<body>

    <div class="theme-toggle" id="themeToggle">🌙</div>

    <div class="container">
        <div class="search-header">
            <h1>
                <span class="star">✨</span>
                <span class="cute-name">卡卡的西</span>
                <span class="star">✨</span>
                <span style="font-weight: 500; background: none; -webkit-background-clip: unset; color: inherit;">&nbsp;临时邮箱</span>
            </h1>
            <!-- 头像链接已替换为您提供的地址 -->
            <img src="https://qu.ax/Pg5Ar.jpeg" class="avatar" alt="avatar">
            <p style="color: var(--text-light-secondary); font-size: 0.85rem; margin-top: 6px; opacity: 0.9;">📭 阅后即焚 · 灵动隐私 · 瞬发电邮</p>
            <div id="addr" class="mail-display">⚡ 正在生成炫光邮箱...</div>
            <div class="btn-group">
                <button onclick="copyMail()" class="btn btn-s">📋 复制地址</button>
                <button id="refreshBtn" onclick="resetAndInit()" class="btn btn-p">🔄 更换地址</button>
            </div>
        </div>

        <div class="results-container">
            <div class="results-title">📬 实时收件箱 · 仅存当前会话</div>
            <div id="list">
                <div style="text-align: center; padding: 60px; color: var(--text-light-secondary);">✨ 玻璃邮箱就绪，等待新邮件飘落 ✨</div>
            </div>
        </div>
    </div>

    <!-- 邮件详情弹窗 -->
    <div id="mailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalSubject" style="font-weight: 700; font-size: 1.15rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%;">邮件详情</span>
                <button class="close-btn" onclick="closeMail()">关闭</button>
            </div>
            <div id="modalBody" class="modal-body">✨ 加载信中流光 ✨</div>
        </div>
    </div>

    <script>
        // ---------- 配置 ----------
        const API_KEY = 'vmail_at6AmSu4dEkuJG4bafc8qhSqBctCMW9q';
        const PROXY = 'https://proxy.api.030101.xyz/https://vmail.dev/api/v1';
        let mid = null;
        let isInitializing = false;

        // ---------- 主题切换 玻璃质感适应 ----------
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.onclick = () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            themeBtn.textContent = isDark ? '☀️' : '🌙';
        };

        // ---------- 初始化邮箱 (生成新地址) ----------
        async function init(retries = 3) {
            if (isInitializing && retries === 3) return;
            isInitializing = true;
            const addrEl = document.getElementById('addr');
            const listEl = document.getElementById('list');
            addrEl.innerText = "🌀 灵动生成中...";
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const r = await fetch(`${PROXY}/mailboxes`, {
                    method: 'POST',
                    headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                if (!r.ok) throw new Error(`API响应错误: ${r.status}`);
                const { data } = await r.json();
                mid = data.id;
                addrEl.innerText = data.address;
                listEl.innerHTML = '<div style="text-align: center; padding: 60px; color: var(--text-light-secondary);">📨 邮箱已激活，新邮件将实时呈现 ✨</div>';
                // 生成后立即拉取一次消息
                refreshInbox();
            } catch (e) {
                console.warn(e);
                if (retries > 0) {
                    setTimeout(() => init(retries - 1), 1200);
                } else {
                    addrEl.innerText = "⚠️ 生成失败，请点击「更换地址」重试";
                    isInitializing = false;
                }
            } finally {
                if (mid) isInitializing = false;
            }
        }

        // 更换地址专用（强制全新邮箱）
        async function resetAndInit() {
            if (isInitializing) return;
            mid = null;
            await init(3);
        }

        // 刷新收件箱 (基于当前mid)
        async function refreshInbox() {
            if (!mid || isInitializing) return;
            try {
                const r = await fetch(`${PROXY}/mailboxes/${mid}/messages`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                if (!r.ok) return;
                const { data } = await r.json();
                const box = document.getElementById('list');
                if (!data || data.length === 0) {
                    if (box.innerHTML.includes('msg-item')) return;
                    box.innerHTML = '<div style="text-align: center; padding: 60px; color: var(--text-light-secondary);">💌 暂无邮件，新邮件会立刻出现 ✨</div>';
                    return;
                }
                // 渲染邮件列表
                box.innerHTML = data.map(m => {
                    const fromName = m.from?.address || '未知发件人';
                    const time = m.receivedAt ? new Date(m.receivedAt).toLocaleTimeString('zh-CN', { hour: '2-digit', minute:'2-digit' }) : '刚刚';
                    const subject = m.subject || '（无主题）';
                    const preview = m.preview || (m.text ? m.text.substring(0, 70) : '点击查看完整内容');
                    return `
                        <div class="msg-item" onclick="viewMail('${m.id}', '${escapeHtml(subject)}')">
                            <div class="msg-meta">📧 ${escapeHtml(fromName)} · ${time}</div>
                            <div class="msg-subject">${escapeHtml(subject)}</div>
                            <div style="font-size:0.85rem; color: var(--text-light-secondary); margin-top: 8px; opacity:0.8;">${escapeHtml(preview)}…</div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                // 静默失败
            }
        }

        // 简单防XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // 查看邮件详情 (modal)
        async function viewMail(msgId, subject) {
            if (!mid) {
                alert('邮箱未就绪，请稍后');
                return;
            }
            const modal = document.getElementById('mailModal');
            const modalBody = document.getElementById('modalBody');
            const modalSub = document.getElementById('modalSubject');
            modalSub.innerText = subject || '无主题邮件';
            modalBody.innerHTML = '<div style="text-align:center;padding:50px;">📡 解密邮件内容中 ...</div>';
            modal.style.display = 'flex';

            try {
                const r = await fetch(`${PROXY}/mailboxes/${mid}/messages/${msgId}`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                if (!r.ok) throw new Error('获取详情失败');
                const { data } = await r.json();
                // 优先html，否则纯文本自动换行
                if (data.html) {
                    modalBody.innerHTML = data.html;
                } else if (data.text) {
                    modalBody.innerHTML = `<div style="white-space: pre-wrap; font-family: inherit; line-height: 1.5;">${escapeHtml(data.text)}</div>`;
                } else {
                    modalBody.innerHTML = '<div style="padding: 20px; text-align:center;">✨ 邮件正文为空 ✨</div>';
                }
            } catch (e) {
                modalBody.innerHTML = '<div style="color:#c00; padding:20px;">❌ 加载失败，可能已被删除或网络波动，请刷新重试。</div>';
            }
        }

        function closeMail() {
            document.getElementById('mailModal').style.display = 'none';
        }

        // 复制邮箱地址
        function copyMail() {
            const addrText = document.getElementById('addr').innerText;
            if (addrText && addrText.includes('@')) {
                navigator.clipboard.writeText(addrText).then(() => {
                    alert('✨ 地址已复制 ✨\n注意：刷新页面后地址将永久失效，请及时使用');
                }).catch(() => alert('手动复制一下叭 ~'));
            } else {
                alert('邮箱尚未生成，请稍等或点击「更换地址」');
            }
        }

        // 监听新邮件（每4.5秒轮询一次，玻璃感动态）
        let pollingInterval = null;

        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(() => {
                refreshInbox();
            }, 4500);
        }

        // 页面关闭或重置时清理无用旧mid资源（但无需额外操作）
        window.addEventListener('DOMContentLoaded', async () => {
            await init(3);
            startPolling();
        });

        // 若重新生成地址时，重置轮询无需重启，继续使用新mid刷新
        window.resetAndInit = resetAndInit;
        // 暴露全局方法便于按钮调用
        window.copyMail = copyMail;
        window.viewMail = viewMail;
        window.closeMail = closeMail;
        window.init = init;    // 以防万一
    </script>
</body>
</html>
