<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>卡卡的西 · QQ音乐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
        }
        /* 通透毛玻璃卡片 */
        .glass-premium {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(28px);
            border-radius: 36px;
            border: 0.5px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }
        .glass-premium:hover {
            background: rgba(255, 255, 255, 0.55);
        }
        /* 分段控制器（音质） */
        .segmented-glass {
            background: rgba(255, 255, 255, 0.55);
            border-radius: 60px;
            padding: 3px;
        }
        .segment-glass {
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            background: transparent;
            color: #2c3e50;
            cursor: pointer;
        }
        .segment-glass-active {
            background: #ffffff;
            color: #1e2a3a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        /* 列表项 */
        .song-row {
            transition: all 0.2s;
            cursor: pointer;
        }
        .song-row:active {
            background: rgba(0,0,0,0.03);
            transform: scale(0.99);
        }
        .playing-highlight {
            background: rgba(100, 150, 250, 0.15);
            border-left: 3px solid #5e9bff;
        }
        /* 控制按钮 */
        .ctrl-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #2c3e50;
        }
        .ctrl-btn:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.85);
        }
        .play-btn {
            background: #5e9bff;
            color: white;
            box-shadow: 0 4px 12px rgba(94, 155, 255, 0.3);
        }
        /* 标签 */
        .tag-glass {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #2c3e50;
            font-weight: 500;
        }
        .tag-glass:active {
            background: rgba(255, 255, 255, 0.85);
            transform: scale(0.96);
        }
        /* 搜索框 */
        .search-glass {
            background: rgba(255, 255, 255, 0.55);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            padding: 12px 20px 12px 48px;
            font-size: 1rem;
            color: #1e2a3a;
            outline: none;
            width: 100%;
        }
        .search-glass:focus {
            background: rgba(255, 255, 255, 0.75);
            border-color: #5e9bff;
        }
        audio {
            width: 100%;
            border-radius: 60px;
            background: rgba(255,255,255,0.5);
            margin-top: 10px;
        }
        .loader {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(0,0,0,0.1);
            border-top: 2px solid #5e9bff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.03); }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
        /* 标题样式 */
        .title-main {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1a2a3a 0%, #3a6b9b 50%, #5e9bff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        @media (max-width: 640px) {
            .title-main { font-size: 2.8rem; }
        }
        .download-btn {
            background: #10b981;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .download-btn:active { transform: scale(0.96); background: #059669; }
    </style>
</head>
<body>
<div id="app" class="max-w-3xl mx-auto px-5 py-6 md:py-10">
    <!-- 标题，前后✨，无多余文字 -->
    <div class="mb-8">
        <h1 class="title-main">✨ 卡卡的西 ✨</h1>
    </div>

    <!-- 搜索卡片 -->
    <div class="glass-premium p-5 mb-6">
        <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
            <span class="text-gray-700 text-sm font-semibold">音质</span>
            <div class="segmented-glass flex">
                <button v-for="q in qualities" :key="q.value" @click="currentQuality = q.value; if(currentSong) refreshUrl()"
                    class="segment-glass" :class="currentQuality === q.value ? 'segment-glass-active' : ''">{{ q.label }}</button>
            </div>
        </div>
        <div class="relative">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input v-model="keyword" @keyup.enter="search" type="text" placeholder="歌曲或歌手" class="search-glass">
        </div>
        <div class="flex gap-2 mt-4 overflow-x-auto pb-1">
            <span v-for="singer in hotSingers" :key="singer" @click="keyword = singer; search()" class="tag-glass whitespace-nowrap">🎤 {{ singer }}</span>
        </div>
    </div>

    <!-- 当前播放卡片 -->
    <div v-if="currentSong" class="glass-premium p-5 mb-6">
        <div class="flex gap-4">
            <img :src="currentSong.artwork" class="w-20 h-20 rounded-2xl shadow-md object-cover" @error="currentSong.artwork = defaultCover">
            <div class="flex-1 min-w-0">
                <div class="text-gray-500 text-xs uppercase">正在播放 · QQ音乐</div>
                <h2 class="text-gray-800 font-semibold text-lg truncate">{{ currentSong.title }}</h2>
                <p class="text-gray-500 text-sm truncate">{{ currentSong.artist }}</p>
            </div>
        </div>
        <audio ref="audio" controls class="mt-3 w-full" @ended="next" @error="onError"></audio>
        <div class="flex justify-center gap-5 mt-3">
            <div class="ctrl-btn" @click="prev"><i class="fas fa-backward-step"></i></div>
            <div class="ctrl-btn play-btn" @click="togglePlay"><i :class="isPlaying ? 'fas fa-pause' : 'fas fa-play'"></i></div>
            <div class="ctrl-btn" @click="next"><i class="fas fa-forward-step"></i></div>
            <div class="ctrl-btn" @click="cycleMode"><i class="fas" :class="modeIcon" :class="{'text-blue-500': playMode !== 'order'}"></i></div>
            <div class="download-btn" @click="downloadSong" v-if="currentPlayUrl"><i class="fas fa-download"></i> 下载</div>
        </div>
        <div v-if="playError" class="text-amber-600 text-xs text-center mt-2">{{ playError }}</div>
    </div>

    <!-- 歌曲列表 -->
    <div class="glass-premium overflow-hidden">
        <div class="px-5 py-3 border-b border-white/50 flex justify-between">
            <span class="text-gray-700 font-semibold">播放列表</span>
            <span v-if="songs.length" class="text-gray-500 text-xs">{{ songs.length }}首</span>
        </div>
        <div ref="listContainer" class="max-h-[500px] overflow-y-auto custom-scroll">
            <div v-if="loading" class="py-16 text-center"><div class="loader mx-auto"></div><p class="text-gray-500 mt-2">搜索中...</p></div>
            <div v-else-if="!songs.length && !loading" class="py-16 text-center"><i class="fas fa-music text-gray-400 text-5xl mb-3"></i><p class="text-gray-500">输入关键词开始</p></div>
            <div v-else>
                <div v-for="(song, idx) in songs" :key="song.id" @click="play(song, idx)" class="song-row px-5 py-3 flex items-center gap-3 border-b border-white/30" :class="{'playing-highlight': currentSong && currentSong.id === song.id}">
                    <div class="text-gray-500 w-7 text-sm">{{ idx+1 }}</div>
                    <img :src="song.artwork" class="w-10 h-10 rounded-lg object-cover" @error="song.artwork = defaultCover">
                    <div class="flex-1 min-w-0">
                        <div class="text-gray-800 font-medium truncate">{{ song.title }}</div>
                        <div class="text-gray-500 text-xs truncate">{{ song.artist }}</div>
                    </div>
                    <div class="text-gray-400 text-xs hidden sm:block">{{ song.duration }}</div>
                    <i class="fas fa-play text-gray-400 text-xs"></i>
                </div>
                <div class="py-4 text-center">
                    <button v-if="hasMore && !loading" @click="loadMore" class="text-gray-500 text-sm py-2 px-4 rounded-full bg-white/40 hover:bg-white/60">加载更多</button>
                    <div v-if="!hasMore && songs.length" class="text-gray-400 text-xs py-2">到底了</div>
                </div>
            </div>
        </div>
    </div>

    <div v-if="msg" class="fixed bottom-6 left-1/2 -translate-x-1/2 toast z-50">{{ msg }}</div>
</div>

<script>
    const { createApp, ref, computed, onMounted, onUnmounted, watch } = Vue;
    const PROXY = 'https://proxy.api.030101.xyz/';
    const urlCache = new Map();
    const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';
    
    const headers = {
        referer: "https://y.qq.com",
        "user-agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/106.0.0.0 Safari/537.36",
        Cookie: "uin=",
    };
    
    function formatMusicItem(_) {
        const albummid = _.album?.mid;
        return {
            id: _.id || _.songid,
            songmid: _.mid || _.songmid,
            title: _.title || _.songname,
            artist: _.singer?.map(s => s.name).join(", ") || "未知歌手",
            artwork: albummid ? `https://y.gtimg.cn/music/photo_new/T002R800x800M000${albummid}.jpg` : defaultCover,
            duration: _.interval ? `${Math.floor(_.interval/60)}:${String(_.interval%60).padStart(2,'0')}` : '03:30'
        };
    }
    
    async function searchMusicQuery(query, page) {
        const postData = {
            req_1: {
                method: "DoSearchForQQMusicDesktop",
                module: "music.search.SearchCgiService",
                param: {
                    num_per_page: 25,
                    page_num: page,
                    query: query,
                    search_type: 0,
                },
            },
        };
        const targetUrl = 'https://u.y.qq.com/cgi-bin/musicu.fcg';
        const res = await axios.post(PROXY + targetUrl, postData, { headers, timeout: 15000 });
        const songList = res.data?.req_1?.data?.body?.song?.list || [];
        return songList.map(formatMusicItem);
    }
    
    async function getPlayUrl(songmid) {
        if (urlCache.has(songmid)) return urlCache.get(songmid);
        try {
            const url = `https://api.xunhuisi.store/API/QQMusic/Song.php?mid=${songmid}`;
            const response = await axios.get(PROXY + url, {
                headers: { 'User-Agent': 'Mozilla/5.0', 'Referer': 'https://y.qq.com', 'Cookie': 'uin=' },
                timeout: 10000
            });
            if (response.data && response.data.code === 200 && response.data.music_url) {
                urlCache.set(songmid, response.data.music_url);
                return response.data.music_url;
            }
            return null;
        } catch (error) {
            console.error('获取播放链接错误:', error);
            return null;
        }
    }
    
    createApp({
        setup() {
            const keyword = ref('');
            const songs = ref([]);
            const loading = ref(false);
            const isLoadingMore = ref(false);
            const currentSong = ref(null);
            const currentPlayUrl = ref('');
            const playError = ref('');
            const msg = ref('');
            const audio = ref(null);
            const isPlaying = ref(false);
            const playMode = ref('order'); // order, random, repeat-one
            const currentIndex = ref(-1);
            const currentPage = ref(1);
            const hasMore = ref(true);
            const pageSize = 25;
            const currentQuality = ref('320k');
            const qualities = [{ value: '128k', label: '标准' },{ value: '320k', label: '高品质' },{ value: 'flac', label: '无损' }];
            const hotSingers = ['周杰伦', '林俊杰', '陈奕迅', '邓紫棋', '薛之谦', '李荣浩', '林忆莲', '王菲'];
            const listContainer = ref(null);
            
            const modeIcon = computed(() => {
                if (playMode.value === 'random') return 'fa-random';
                if (playMode.value === 'repeat-one') return 'fa-repeat';
                return 'fa-repeat';
            });
            const showMsg = (text) => { msg.value = text; setTimeout(() => msg.value = '', 2000); };
            
            // 更新锁屏/灵动岛信息
            const updateMediaSession = (song) => {
                if ('mediaSession' in navigator && song) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: song.title,
                        artist: song.artist,
                        artwork: [{ src: song.artwork, sizes: '512x512' }]
                    });
                    navigator.mediaSession.setActionHandler('play', () => audio.value?.play());
                    navigator.mediaSession.setActionHandler('pause', () => audio.value?.pause());
                    navigator.mediaSession.setActionHandler('previoustrack', () => prev());
                    navigator.mediaSession.setActionHandler('nexttrack', () => next());
                }
            };
            
            // 播放核心
            const playTrack = async (song, idx) => {
                if (!song) return;
                currentSong.value = song;
                currentIndex.value = idx;
                playError.value = '';
                updateMediaSession(song);
                const url = await getPlayUrl(song.songmid);
                if (url) {
                    currentPlayUrl.value = url;
                    if (audio.value) {
                        audio.value.src = url;
                        audio.value.load();
                        try {
                            await audio.value.play();
                            isPlaying.value = true;
                        } catch (err) {
                            playError.value = '播放失败，自动跳过';
                            showMsg(`⚠️ 无法播放: ${song.title}，跳过`);
                            setTimeout(() => next(), 100);
                        }
                    }
                    showMsg(`🎵 ${song.title}`);
                } else {
                    playError.value = '获取播放链接失败';
                    showMsg(`⚠️ 无法获取播放链接: ${song.title}`);
                    setTimeout(() => next(), 100);
                }
            };
            
            const getNextIndex = () => {
                if (!songs.value.length) return -1;
                if (playMode.value === 'random') {
                    if (songs.value.length === 1) return 0;
                    let newIdx = Math.floor(Math.random() * songs.value.length);
                    while (newIdx === currentIndex.value && songs.value.length > 1) newIdx = Math.floor(Math.random() * songs.value.length);
                    return newIdx;
                } else if (playMode.value === 'repeat-one') {
                    return currentIndex.value;
                } else {
                    return (currentIndex.value + 1) % songs.value.length;
                }
            };
            
            const next = async () => {
                if (!songs.value.length) return;
                if (playMode.value === 'repeat-one') {
                    if (audio.value && currentSong.value) {
                        audio.value.currentTime = 0;
                        await audio.value.play().catch(e => console.warn(e));
                    }
                    return;
                }
                const nextIdx = getNextIndex();
                if (nextIdx !== -1 && songs.value[nextIdx]) {
                    await playTrack(songs.value[nextIdx], nextIdx);
                }
            };
            
            const prev = async () => {
                if (!songs.value.length) return;
                let prevIdx;
                if (playMode.value === 'random') prevIdx = Math.floor(Math.random() * songs.value.length);
                else if (playMode.value === 'repeat-one') prevIdx = currentIndex.value;
                else prevIdx = (currentIndex.value - 1 + songs.value.length) % songs.value.length;
                if (prevIdx >= 0 && songs.value[prevIdx]) await playTrack(songs.value[prevIdx], prevIdx);
            };
            
            const onError = () => {
                if (currentSong.value) {
                    playError.value = '播放出错，跳过';
                    showMsg(`⚠️ 播放出错: ${currentSong.value.title}，跳过`);
                    next();
                }
            };
            const togglePlay = () => {
                if (!audio.value) return;
                if (isPlaying.value) audio.value.pause();
                else audio.value.play().catch(e => console.warn(e));
            };
            const refreshUrl = async () => {
                if (currentSong.value) {
                    const url = await getPlayUrl(currentSong.value.songmid);
                    if (url && audio.value) {
                        const wasPlaying = !audio.value.paused;
                        currentPlayUrl.value = url;
                        audio.value.src = url;
                        audio.value.load();
                        if (wasPlaying) audio.value.play().catch(e => console.warn(e));
                    }
                }
            };
            const cycleMode = () => {
                if (playMode.value === 'order') playMode.value = 'random';
                else if (playMode.value === 'random') playMode.value = 'repeat-one';
                else playMode.value = 'order';
                showMsg(`模式: ${playMode.value === 'order' ? '顺序' : playMode.value === 'random' ? '随机' : '单曲循环'}`);
            };
            const play = (song, idx) => playTrack(song, idx);
            
            // 搜索主函数
            const search = async () => {
                if (!keyword.value.trim()) { showMsg('输入歌手或歌曲'); return; }
                loading.value = true;
                currentPage.value = 1;
                hasMore.value = true;
                songs.value = [];
                currentSong.value = null;
                currentPlayUrl.value = '';
                if (audio.value) audio.value.pause();
                try {
                    const results = await searchMusicQuery(keyword.value, 1);
                    songs.value = results;
                    hasMore.value = results.length === pageSize;
                    showMsg(results.length ? `找到 ${results.length} 首` : '未找到');
                    if (results.length) currentPage.value = 2;
                } catch(e) { console.error(e); showMsg('搜索失败'); }
                loading.value = false;
            };
            
            const loadMore = async () => {
                if (isLoadingMore.value || !hasMore.value || loading.value) return;
                isLoadingMore.value = true;
                try {
                    const results = await searchMusicQuery(keyword.value, currentPage.value);
                    if (results.length) {
                        songs.value = [...songs.value, ...results];
                        hasMore.value = results.length === pageSize;
                        currentPage.value++;
                    } else {
                        hasMore.value = false;
                    }
                } catch(e) { showMsg('加载更多失败'); }
                isLoadingMore.value = false;
            };
            
            const downloadSong = async () => {
                if (!currentPlayUrl.value || !currentSong.value) {
                    showMsg('没有可下载的歌曲');
                    return;
                }
                try {
                    const response = await axios.get(PROXY + currentPlayUrl.value, { responseType: 'blob', timeout: 30000 });
                    const blob = new Blob([response.data], { type: 'audio/mpeg' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${currentSong.value.title} - ${currentSong.value.artist}.mp3`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showMsg('下载完成');
                } catch (err) {
                    showMsg('下载失败，请重试');
                }
            };
            
            const handleScroll = () => {
                if (!listContainer.value) return;
                const { scrollTop, clientHeight, scrollHeight } = listContainer.value;
                if (scrollTop + clientHeight >= scrollHeight - 100 && hasMore.value && !isLoadingMore.value && !loading.value && keyword.value.trim())
                    loadMore();
            };
            
            onMounted(() => {
                if (listContainer.value) listContainer.value.addEventListener('scroll', handleScroll);
                if (audio.value) {
                    audio.value.addEventListener('play', () => isPlaying.value = true);
                    audio.value.addEventListener('pause', () => isPlaying.value = false);
                }
            });
            onUnmounted(() => {
                if (listContainer.value) listContainer.value.removeEventListener('scroll', handleScroll);
            });
            watch(audio, (val) => {
                if (val) {
                    val.addEventListener('play', () => isPlaying.value = true);
                    val.addEventListener('pause', () => isPlaying.value = false);
                }
            });
            
            return {
                keyword, songs, loading, isLoadingMore, currentSong, currentPlayUrl, playError, msg,
                currentQuality, qualities, defaultCover, hotSingers, hasMore, listContainer, audio, isPlaying,
                playMode, modeIcon,
                search, loadMore, play, togglePlay, next, prev, cycleMode, onError, refreshUrl, downloadSong
            };
        }
    }).mount('#app');
</script>
</body>
</html>
