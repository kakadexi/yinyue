<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>卡卡的西 · 梦幻极光</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        }
        body {
            background: radial-gradient(ellipse at 20% 30%, #1a0b2e, #0a0a1a);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        /* 梦幻极光动态背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(255, 100, 200, 0.3), transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(0, 200, 255, 0.25), transparent 60%),
                        repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }
        /* 毛玻璃卡片 - 梦幻炫光 */
        .glass-dream {
            background: rgba(20, 15, 35, 0.55);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), 0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
            transition: all 0.3s ease;
        }
        .glass-dream:hover {
            background: rgba(25, 20, 45, 0.65);
            border-color: rgba(255, 200, 255, 0.4);
        }
        /* 分段控制器 */
        .segmented-glow {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            padding: 3px;
            backdrop-filter: blur(10px);
        }
        .segment-glow {
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            transition: 0.2s;
            cursor: pointer;
        }
        .segment-glow-active {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #1a0b2e;
            box-shadow: 0 2px 10px rgba(255, 154, 158, 0.4);
        }
        /* 列表项 */
        .song-row {
            transition: all 0.2s;
            cursor: pointer;
        }
        .song-row:active {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(0.99);
        }
        .playing-highlight {
            background: linear-gradient(90deg, rgba(255, 154, 158, 0.25), rgba(250, 208, 196, 0.1));
            border-left: 3px solid #ff9a9e;
        }
        /* 控制按钮 */
        .ctrl-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            cursor: pointer;
            border: 0.5px solid rgba(255,255,255,0.2);
        }
        .ctrl-btn:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.25);
        }
        .play-btn {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #1a0b2e;
            border: none;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.5);
        }
        .play-btn:active {
            background: linear-gradient(135deg, #ff7a7e, #f8b0a0);
        }
        /* 标签 */
        .tag-glow {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.85rem;
            transition: 0.2s;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.9);
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .tag-glow:active {
            background: rgba(255, 200, 200, 0.3);
            transform: scale(0.96);
        }
        /* 输入框 */
        .search-dream {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            padding: 12px 20px 12px 48px;
            font-size: 1rem;
            color: white;
            outline: none;
            width: 100%;
            transition: all 0.2s;
        }
        .search-dream:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 200, 200, 0.5);
        }
        /* 原生 audio 控件圆润 */
        audio {
            width: 100%;
            border-radius: 60px;
            background: rgba(0,0,0,0.4);
            margin-top: 10px;
        }
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
        }
        .loader {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #ff9a9e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(24px);
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div id="app" class="max-w-3xl mx-auto px-5 py-6 md:py-8 relative z-10">
    
    <!-- 只保留标题 "卡卡的西" -->
    <div class="mb-8">
        <h1 class="text-5xl md:text-6xl font-bold bg-gradient-to-r from-pink-300 via-purple-300 to-indigo-300 bg-clip-text text-transparent tracking-tight">卡卡的西</h1>
    </div>

    <!-- 搜索卡片 -->
    <div class="glass-dream p-5 mb-6">
        <div class="flex justify-between items-center mb-4">
            <span class="text-white/70 text-sm font-semibold">音质</span>
            <div class="segmented-glow flex">
                <button v-for="q in qualities" :key="q.value" @click="currentQuality = q.value; if(currentSong) refreshUrl()"
                    class="segment-glow" :class="currentQuality === q.value ? 'segment-glow-active' : ''">{{ q.label }}</button>
            </div>
        </div>
        <div class="relative">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-white/40 text-sm"></i>
            <input v-model="keyword" @keyup.enter="searchMusic" type="text" placeholder="歌曲或歌手" class="search-dream">
        </div>
        <div class="flex gap-2 mt-4 overflow-x-auto pb-1">
            <span v-for="tag in quickTags" :key="tag" @click="keyword = tag; searchMusic()" class="tag-glow whitespace-nowrap">🎤 {{ tag }}</span>
        </div>
    </div>

    <!-- 当前播放卡片 -->
    <div v-if="currentSong" class="glass-dream p-5 mb-6">
        <div class="flex gap-4">
            <img :src="currentSong.cover" class="w-20 h-20 rounded-2xl shadow-md object-cover" @error="currentSong.cover = defaultCover">
            <div class="flex-1 min-w-0">
                <div class="text-white/50 text-xs uppercase tracking-wide">正在播放</div>
                <h2 class="text-white font-semibold text-lg truncate">{{ currentSong.name }}</h2>
                <p class="text-white/40 text-sm truncate">{{ currentSong.artist }}</p>
            </div>
        </div>
        <audio ref="audioPlayer" controls class="mt-3 w-full" @ended="onAudioEnded" @error="onPlayError"></audio>
        <div class="flex justify-center gap-5 mt-3">
            <div class="ctrl-btn" @click="prevTrack"><i class="fas fa-backward-step text-white text-base"></i></div>
            <div class="ctrl-btn play-btn" @click="togglePlayPause"><i :class="isPlaying ? 'fas fa-pause' : 'fas fa-play'" class="text-black text-base"></i></div>
            <div class="ctrl-btn" @click="nextTrack"><i class="fas fa-forward-step text-white text-base"></i></div>
            <div class="ctrl-btn" @click="cycleMode"><i class="fas" :class="modeIcon" :class="{'text-pink-300': playMode !== 'order'}"></i></div>
        </div>
        <div v-if="playError" class="text-amber-300 text-xs text-center mt-2">{{ playError }}</div>
    </div>

    <!-- 歌曲列表 -->
    <div class="glass-dream overflow-hidden">
        <div class="px-5 py-3 border-b border-white/10 flex justify-between items-center">
            <span class="text-white font-semibold">播放列表</span>
            <span v-if="songs.length" class="text-white/30 text-xs">{{ songs.length }} 首</span>
        </div>
        <div ref="listContainer" class="max-h-[500px] overflow-y-auto custom-scroll">
            <div v-if="loading && !songs.length" class="py-16 text-center"><div class="loader mx-auto mb-3"></div><p class="text-white/40 text-sm">加载中...</p></div>
            <div v-else-if="!songs.length && !loading" class="py-16 text-center"><i class="fas fa-music text-white/20 text-5xl mb-3"></i><p class="text-white/40 text-sm">搜索歌曲开始聆听</p></div>
            <div v-else>
                <div v-for="(song, idx) in songs" :key="song.id" @click="playSong(song, idx)" class="song-row px-5 py-3 flex items-center gap-3 border-b border-white/5" :class="{'playing-highlight': currentSong && currentSong.id === song.id}">
                    <div class="text-white/40 w-7 text-sm font-mono">{{ idx+1 }}</div>
                    <img :src="song.cover" class="w-10 h-10 rounded-lg object-cover" @error="song.cover = defaultCover">
                    <div class="flex-1 min-w-0">
                        <div class="text-white font-medium truncate text-sm">{{ song.name }}</div>
                        <div class="text-white/40 text-xs truncate">{{ song.artist }}</div>
                    </div>
                    <div class="text-white/30 text-xs hidden sm:block">{{ song.duration }}</div>
                    <i class="fas fa-play text-white/30 text-xs"></i>
                </div>
                <div class="py-4 text-center">
                    <div v-if="isLoadingMore" class="loader w-5 h-5 mx-auto"></div>
                    <button v-else-if="hasMore && !loading" @click="loadMore" class="text-white/40 text-sm py-2 px-4 rounded-full bg-white/5 hover:bg-white/10 transition">加载更多</button>
                    <div v-if="!hasMore && songs.length > 0" class="text-white/20 text-xs py-2">—— 到底了 ——</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <transition name="fade"><div v-if="msg" class="fixed bottom-6 left-1/2 -translate-x-1/2 toast z-50">{{ msg }}</div></transition>
</div>

<script>
    const { createApp, ref, onMounted, onUnmounted, watch, computed } = Vue;
    const PROXY = 'https://proxy.api.030101.xyz/';
    const proxyPost = async (url, data, headers = {}) => {
        const res = await axios.post(PROXY + url, data, { headers: { 'User-Agent': 'Mozilla/5.0', 'Content-Type': 'application/json', ...headers }, timeout: 15000 });
        return res.data;
    };

    createApp({
        setup() {
            const keyword = ref('');
            const songs = ref([]);
            const loading = ref(false);
            const isLoadingMore = ref(false);
            const currentSong = ref(null);
            const playError = ref('');
            const msg = ref('');
            const currentQuality = ref('320k');
            const audioPlayer = ref(null);
            const isPlaying = ref(false);
            const playMode = ref('order'); // order, random, repeat-one
            const currentIndex = ref(-1);
            const currentPage = ref(1);
            const hasMore = ref(true);
            const pageSize = 30;
            const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';
            const qualities = [{ value: '128k', label: '标准' },{ value: '320k', label: '高品质' },{ value: 'flac', label: '无损' }];
            const quickTags = ['周杰伦', '林俊杰', '陈奕迅', '邓紫棋', '稻香', '夜曲', '孤勇者', '海阔天空'];
            const listContainer = ref(null);
            
            const modeIcon = computed(() => {
                if (playMode.value === 'random') return 'fa-random';
                if (playMode.value === 'repeat-one') return 'fa-repeat';
                return 'fa-repeat';
            });
            
            const showMsg = (text) => { msg.value = text; setTimeout(() => msg.value = '', 2000); };
            
            // 获取播放链接
            const getPlayUrl = async (songmid) => {
                if (!songmid) return null;
                try {
                    const map = { '128k': 'standard', '320k': 'exhigh', 'flac': 'lossless' };
                    const level = map[currentQuality.value];
                    return `https://music.nxinxz.com/kgqq/tx.php?id=${songmid}&level=${level}&type=mp3`;
                } catch { return null; }
            };
            const getNeteaseFallback = (name) => {
                const map = { '晴天': '186016', '稻香': '186004', '夜曲': '186038', '七里香': '186008', '告白气球': '418603077', '海阔天空': '346334', '起风了': '1330348068', '孤勇者': '1901371647' };
                for (let [k, id] of Object.entries(map)) if (name.includes(k)) return `https://music.163.com/song/media/outer/url?id=${id}.mp3`;
                return null;
            };
            const fetchSongUrl = async (song) => {
                let url = null;
                if (song.mid) url = await getPlayUrl(song.mid);
                if (!url) url = getNeteaseFallback(song.name);
                if (!url) url = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
                return url;
            };
            
            // 播放核心：尝试播放，失败则自动下一首
            const playTrack = async (song, index) => {
                if (!song) return;
                currentSong.value = song;
                currentIndex.value = index;
                playError.value = '';
                const url = await fetchSongUrl(song);
                if (audioPlayer.value) {
                    audioPlayer.value.src = url;
                    audioPlayer.value.load();
                    try {
                        await audioPlayer.value.play();
                        isPlaying.value = true;
                    } catch (err) {
                        console.warn('播放失败:', err);
                        playError.value = '播放失败，自动跳过';
                        showMsg(`⚠️ 无法播放: ${song.name}，跳过`);
                        // 关键修复：播放失败后自动跳到下一首
                        setTimeout(() => {
                            if (currentSong.value === song) {
                                nextTrack();
                            }
                        }, 100);
                        return;
                    }
                }
                showMsg(`🎵 ${song.name}`);
            };
            
            // 下一首（核心连播逻辑）
            const getNextIndex = () => {
                if (songs.value.length === 0) return -1;
                if (playMode.value === 'random') {
                    if (songs.value.length === 1) return 0;
                    let newIdx = Math.floor(Math.random() * songs.value.length);
                    while (newIdx === currentIndex.value) newIdx = Math.floor(Math.random() * songs.value.length);
                    return newIdx;
                } else if (playMode.value === 'repeat-one') {
                    return currentIndex.value;
                } else {
                    return (currentIndex.value + 1) % songs.value.length;
                }
            };
            
            const nextTrack = async () => {
                if (songs.value.length === 0) return;
                if (playMode.value === 'repeat-one') {
                    if (audioPlayer.value && currentSong.value) {
                        audioPlayer.value.currentTime = 0;
                        await audioPlayer.value.play().catch(e => console.warn(e));
                    }
                    return;
                }
                const nextIdx = getNextIndex();
                if (nextIdx !== -1 && songs.value[nextIdx]) {
                    await playTrack(songs.value[nextIdx], nextIdx);
                }
            };
            
            const prevTrack = async () => {
                if (songs.value.length === 0) return;
                let prevIdx;
                if (playMode.value === 'random') prevIdx = Math.floor(Math.random() * songs.value.length);
                else if (playMode.value === 'repeat-one') prevIdx = currentIndex.value;
                else prevIdx = (currentIndex.value - 1 + songs.value.length) % songs.value.length;
                if (prevIdx >= 0 && songs.value[prevIdx]) await playTrack(songs.value[prevIdx], prevIdx);
            };
            
            const onAudioEnded = () => {
                // 正常结束，自动下一首
                nextTrack();
            };
            
            const onPlayError = () => {
                // 原生 audio 出现 error 时也自动跳过
                if (currentSong.value) {
                    playError.value = '播放出错，跳过';
                    showMsg(`⚠️ 播放出错: ${currentSong.value.name}，跳过`);
                    nextTrack();
                }
            };
            
            const togglePlayPause = () => {
                if (!audioPlayer.value) return;
                if (isPlaying.value) audioPlayer.value.pause();
                else audioPlayer.value.play().catch(e => console.warn(e));
            };
            
            const refreshUrl = async () => {
                if (currentSong.value) {
                    const url = await fetchSongUrl(currentSong.value);
                    if (audioPlayer.value) {
                        const wasPlaying = !audioPlayer.value.paused;
                        audioPlayer.value.src = url;
                        audioPlayer.value.load();
                        if (wasPlaying) audioPlayer.value.play().catch(e => console.warn(e));
                    }
                }
            };
            
            const cycleMode = () => {
                if (playMode.value === 'order') playMode.value = 'random';
                else if (playMode.value === 'random') playMode.value = 'repeat-one';
                else playMode.value = 'order';
                showMsg(`模式: ${playMode.value === 'order' ? '顺序' : playMode.value === 'random' ? '随机' : '单曲循环'}`);
            };
            
            const playSong = async (song, idx) => {
                await playTrack(song, idx);
            };
            
            // 绑定音频事件同步播放状态
            const bindEvents = () => {
                if (!audioPlayer.value) return;
                audioPlayer.value.removeEventListener('play', () => {});
                audioPlayer.value.removeEventListener('pause', () => {});
                audioPlayer.value.addEventListener('play', () => { isPlaying.value = true; });
                audioPlayer.value.addEventListener('pause', () => { isPlaying.value = false; });
            };
            
            // 搜索相关
            const fetchSongs = async (query, page) => {
                const postData = {
                    req_1: {
                        method: "DoSearchForQQMusicDesktop",
                        module: "music.search.SearchCgiService",
                        param: { num_per_page: pageSize, page_num: page, query: query, search_type: 0 }
                    }
                };
                const data = await proxyPost('https://u.y.qq.com/cgi-bin/musicu.fcg', postData, { 'Referer': 'https://y.qq.com' });
                const songList = data?.req_1?.data?.body?.song?.list || [];
                const formatted = songList.map(item => ({
                    id: item.id, mid: item.mid, name: item.name,
                    artist: item.singer?.map(s => s.name).join(', ') || '未知歌手',
                    cover: item.album?.mid ? `https://y.gtimg.cn/music/photo_new/T002R300x300M000${item.album.mid}.jpg` : defaultCover,
                    duration: item.interval ? `${Math.floor(item.interval/60)}:${String(item.interval%60).padStart(2,'0')}` : '03:30'
                }));
                return { list: formatted, hasMore: songList.length === pageSize };
            };
            
            const searchMusic = async () => {
                if (!keyword.value.trim()) { showMsg('输入歌手或歌曲'); return; }
                loading.value = true;
                currentPage.value = 1;
                hasMore.value = true;
                songs.value = [];
                currentSong.value = null;
                if (audioPlayer.value) audioPlayer.value.pause();
                try {
                    const { list, hasMore: more } = await fetchSongs(keyword.value, 1);
                    songs.value = list;
                    hasMore.value = more;
                    if (list.length === 0) showMsg('未找到歌曲');
                    else showMsg(`找到 ${list.length} 首`);
                    if (list.length) currentPage.value = 2;
                } catch (err) { showMsg('搜索失败'); }
                finally { loading.value = false; }
            };
            
            const loadMore = async () => {
                if (isLoadingMore.value || !hasMore.value || loading.value) return;
                isLoadingMore.value = true;
                try {
                    const { list, hasMore: more } = await fetchSongs(keyword.value, currentPage.value);
                    songs.value = [...songs.value, ...list];
                    hasMore.value = more;
                    if (list.length) currentPage.value++;
                } catch (err) { showMsg('加载更多失败'); }
                finally { isLoadingMore.value = false; }
            };
            
            const handleScroll = () => {
                if (!listContainer.value) return;
                const { scrollTop, clientHeight, scrollHeight } = listContainer.value;
                if (scrollTop + clientHeight >= scrollHeight - 100) {
                    if (hasMore.value && !isLoadingMore.value && !loading.value && keyword.value.trim()) loadMore();
                }
            };
            
            onMounted(() => {
                if (listContainer.value) listContainer.value.addEventListener('scroll', handleScroll);
                if (audioPlayer.value) bindEvents();
            });
            onUnmounted(() => {
                if (listContainer.value) listContainer.value.removeEventListener('scroll', handleScroll);
            });
            watch(audioPlayer, (newVal) => { if (newVal) bindEvents(); });
            
            return {
                keyword, songs, loading, isLoadingMore, currentSong, playError, msg, currentQuality,
                qualities, defaultCover, quickTags, hasMore, listContainer, audioPlayer, isPlaying,
                playMode, modeIcon,
                searchMusic, loadMore, playSong, togglePlayPause, nextTrack, prevTrack,
                cycleMode, onAudioEnded, refreshUrl, onPlayError
            };
        }
    }).mount('#app');
</script>
</body>
</html>
