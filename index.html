<script>
const { createApp, ref, onMounted, onUnmounted, watch, computed } = Vue;

const PROXY = 'https://proxy.api.030101.xyz/';
const proxyPost = async (url, data, headers = {}) => {
    const res = await axios.post(PROXY + url, data, { headers: { 'User-Agent': 'Mozilla/5.0', 'Content-Type': 'application/json', ...headers }, timeout: 15000 });
    return res.data;
};

createApp({
setup() {

const keyword = ref('');
const songs = ref([]);
const loading = ref(false);
const isLoadingMore = ref(false);
const currentSong = ref(null);
const playError = ref('');
const msg = ref('');
const currentQuality = ref('320k');
const audioPlayer = ref(null);
const isPlaying = ref(false);
const playMode = ref('order');
const currentIndex = ref(-1);
const currentPage = ref(1);
const hasMore = ref(true);
const pageSize = 30;

const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';

const qualities = [
{ value: '128k', label: '标准' },
{ value: '320k', label: '高品质' },
{ value: 'flac', label: '无损' }
];

const hotSingers = ['周杰伦','林俊杰','陈奕迅','邓紫棋','薛之谦','李荣浩','林忆莲','王菲'];

const listContainer = ref(null);

const urlCache = new Map();

const modeIcon = computed(() => {
    if (playMode.value === 'random') return 'fa-random';
    if (playMode.value === 'repeat-one') return 'fa-repeat';
    return 'fa-repeat';
});

const showMsg = (text) => {
    msg.value = text;
    setTimeout(() => msg.value = '', 2000);
};



// ✅ 新增：检测音频是否可播放
const testAudio = (url) => {
    return new Promise(resolve => {
        const a = new Audio();
        a.src = url;
        a.oncanplay = () => resolve(true);
        a.onerror = () => resolve(false);
        setTimeout(() => resolve(false), 3000);
    });
};


// ✅ 新增：酷我音源（主力）
const getKuwoUrl = async (song) => {
    try {
        const res = await axios.get('https://www.kuwo.cn/api/www/search/searchMusicBykeyWord', {
            params: { key: song.name + ' ' + song.artist, pn: 1, rn: 1 },
            headers: {
                'Referer': 'https://www.kuwo.cn/',
                'User-Agent': 'Mozilla/5.0'
            }
        });

        const s = res.data?.data?.list?.[0];
        if (!s) return null;

        const play = await axios.get('https://www.kuwo.cn/api/v1/www/music/playUrl', {
            params: { mid: s.rid },
            headers: { 'Referer': 'https://www.kuwo.cn/' }
        });

        return play.data?.data?.url || null;

    } catch {
        return null;
    }
};


// ❗ 保留你的函数（但作为备用）
const getPlayUrl = async (songmid) => {
    if (!songmid) return null;
    try {
        return `https://music.nxinxz.com/kgqq/tx.php?id=${songmid}&type=mp3`;
    } catch { return null; }
};

const getNeteaseFallback = (name) => {
    const map = { '晴天':'186016','稻香':'186004','夜曲':'186038','七里香':'186008' };
    for (let [k,id] of Object.entries(map))
        if (name.includes(k))
            return `https://music.163.com/song/media/outer/url?id=${id}.mp3`;
    return null;
};


// 🔥🔥🔥 核心：替换这里
const fetchSongUrl = async (song) => {

    if (urlCache.has(song.id)) return urlCache.get(song.id);

    // 1️⃣ 酷我（主力）
    const kuwo = await getKuwoUrl(song);
    if (kuwo && await testAudio(kuwo)) {
        urlCache.set(song.id, kuwo);
        return kuwo;
    }

    // 2️⃣ QQ（备用）
    const qq = await getPlayUrl(song.mid);
    if (qq && await testAudio(qq)) {
        urlCache.set(song.id, qq);
        return qq;
    }

    // 3️⃣ 网易兜底
    const netease = getNeteaseFallback(song.name);
    if (netease && await testAudio(netease)) {
        urlCache.set(song.id, netease);
        return netease;
    }

    return 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
};


// ====== 下面全部是你原代码（未动）======

// 播放核心
const playTrack = async (song, index) => {
    if (!song) return;
    currentSong.value = song;
    currentIndex.value = index;
    playError.value = '';
    const url = await fetchSongUrl(song);

    if (audioPlayer.value) {
        audioPlayer.value.src = url;
        audioPlayer.value.load();
        try {
            await audioPlayer.value.play();
            isPlaying.value = true;
        } catch (err) {
            playError.value = '播放失败';
            nextTrack();
        }
    }
};

const nextTrack = async () => {
    if (!songs.value.length) return;
    const next = (currentIndex.value + 1) % songs.value.length;
    playTrack(songs.value[next], next);
};

const prevTrack = async () => {
    if (!songs.value.length) return;
    const prev = (currentIndex.value - 1 + songs.value.length) % songs.value.length;
    playTrack(songs.value[prev], prev);
};

const togglePlayPause = () => {
    if (!audioPlayer.value) return;
    if (audioPlayer.value.paused) audioPlayer.value.play();
    else audioPlayer.value.pause();
};

const playSong = async (song, idx) => {
    await playTrack(song, idx);
};


// 搜索（完全没动）
const fetchSongs = async (query, page) => {
    const postData = {
        req_1: {
            method: "DoSearchForQQMusicDesktop",
            module: "music.search.SearchCgiService",
            param: { num_per_page: pageSize, page_num: page, query: query, search_type: 0 }
        }
    };
    const data = await proxyPost('https://u.y.qq.com/cgi-bin/musicu.fcg', postData, { 'Referer': 'https://y.qq.com' });
    const songList = data?.req_1?.data?.body?.song?.list || [];
    const formatted = songList.map(item => ({
        id: item.id, mid: item.mid, name: item.name,
        artist: item.singer?.map(s => s.name).join(', ') || '未知歌手',
        cover: item.album?.mid ? `https://y.gtimg.cn/music/photo_new/T002R300x300M000${item.album.mid}.jpg` : defaultCover,
        duration: item.interval ? `${Math.floor(item.interval/60)}:${String(item.interval%60).padStart(2,'0')}` : '03:30'
    }));
    return { list: formatted, hasMore: songList.length === pageSize };
};

const searchMusic = async () => {
    if (!keyword.value.trim()) return;
    loading.value = true;
    songs.value = [];
    const { list } = await fetchSongs(keyword.value, 1);
    songs.value = list;
    loading.value = false;
};

return {
    keyword,songs,loading,currentSong,playSong,
    searchMusic,audioPlayer,isPlaying,
    togglePlayPause,nextTrack,prevTrack
};

}
}).mount('#app');
</script>
