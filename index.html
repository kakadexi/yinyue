<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡卡的西 · 灵动玻璃</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<style>
body{background:#eef3ff}
.glass-premium{background:rgba(255,255,255,.4);border-radius:20px}
</style>
</head>

<body>
<div id="app" class="max-w-3xl mx-auto p-5">

<input v-model="keyword" @keyup.enter="searchMusic" placeholder="搜索歌曲" class="w-full p-3 rounded mb-4">

<div v-for="(song,i) in songs" @click="playSong(song,i)" class="p-2 border-b cursor-pointer">
{{song.name}} - {{song.artist}}
</div>

<audio ref="audioPlayer" controls class="w-full mt-4"></audio>

</div>

<script>
const {createApp,ref}=Vue;

createApp({
setup(){

const keyword=ref('');
const songs=ref([]);
const audioPlayer=ref(null);

// ===== 播放检测 =====
const testAudio=(url)=>{
return new Promise(r=>{
const a=new Audio();
a.src=url;
a.oncanplay=()=>r(true);
a.onerror=()=>r(false);
setTimeout(()=>r(false),3000);
});
};

// ===== 酷我 =====
const getKuwoUrl=async(song)=>{
try{
const r=await axios.get('https://www.kuwo.cn/api/www/search/searchMusicBykeyWord',{
params:{key:song.name+' '+song.artist,pn:1,rn:1},
headers:{Referer:'https://www.kuwo.cn/'}
});
const s=r.data?.data?.list?.[0];
if(!s)return null;

const p=await axios.get('https://www.kuwo.cn/api/v1/www/music/playUrl',{
params:{mid:s.rid},
headers:{Referer:'https://www.kuwo.cn/'}
});
return p.data?.data?.url||null;
}catch{return null;}
};

// ===== QQ =====
const getQQUrl=async(mid)=>{
return `https://music.nxinxz.com/kgqq/tx.php?id=${mid}&type=mp3`;
};

// ===== 网易 =====
const get163=(name)=>{
const map={'晴天':'186016','稻香':'186004'};
for(let k in map) if(name.includes(k)) return `https://music.163.com/song/media/outer/url?id=${map[k]}.mp3`;
return null;
};

// ===== 核心播放 =====
const fetchSongUrl=async(song)=>{

// 酷我
const kuwo=await getKuwoUrl(song);
if(kuwo && await testAudio(kuwo)) return kuwo;

// QQ
const qq=await getQQUrl(song.mid);
if(qq && await testAudio(qq)) return qq;

// 网易
const n163=get163(song.name);
if(n163 && await testAudio(n163)) return n163;

// 兜底
return 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
};

// ===== 搜索（你原逻辑）=====
const searchMusic=async()=>{
const res=await axios.get('https://api.i-meto.com/meting/api',{
params:{server:'tencent',type:'search',s:keyword.value}
});
songs.value=res.data.map(i=>({
name:i.name,
artist:i.artist,
mid:i.id
}));
};

// ===== 播放 =====
const playSong=async(song)=>{
const url=await fetchSongUrl(song);
audioPlayer.value.src=url;
audioPlayer.value.play();
};

return{keyword,songs,searchMusic,playSong,audioPlayer};

}
}).mount('#app');
</script>

</body>
</html>
