<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨卡卡的西全网盘搜 | 夸克资源专搜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #eef2fa;
            --card-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-primary: #1a2c3e;
            --text-secondary: #3a546d;
            --border-color: rgba(255, 255, 255, 0.5);
            --accent-color: #2c6e9e;
            --accent-hover: #1f5277;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --marquee-bg: rgba(255, 255, 255, 0.2);
            --result-bg: rgba(44, 110, 158, 0.08);
            --input-bg: rgba(255, 255, 255, 0.55);
            --tag-bg: rgba(44, 110, 158, 0.12);
            --password-tag: rgba(255, 193, 7, 0.2);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05), 0 2px 6px rgba(0, 0, 0, 0.02);
            --shadow-lg: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            --blur-amount: 12px;
        }

        body.dark {
            --bg-color: #0b1120;
            --card-bg: rgba(18, 25, 45, 0.75);
            --glass-border: rgba(72, 92, 128, 0.4);
            --text-primary: #f0f3fa;
            --text-secondary: #9aaec9;
            --border-color: rgba(66, 88, 118, 0.5);
            --accent-color: #6aa9ff;
            --accent-hover: #4c8de0;
            --glass-bg: rgba(0, 0, 0, 0.38);
            --result-bg: rgba(106, 169, 255, 0.12);
            --input-bg: rgba(30, 41, 59, 0.7);
            --tag-bg: rgba(106, 169, 255, 0.2);
            --password-tag: rgba(245, 158, 11, 0.25);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.2s;
            backdrop-filter: blur(0px);
        }

        /* 灵动玻璃质感 - 全局背景透光 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 100px;
        }

        /* 玻璃质感头部 */
        .search-header {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border-radius: 48px;
            padding: 36px 40px;
            margin-bottom: 36px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            text-align: center;
        }

        .search-header:hover {
            box-shadow: var(--shadow-lg);
            border-color: rgba(106, 169, 255, 0.5);
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            margin: 0 0 12px 0;
            background: linear-gradient(135deg, #3b82f6, #a855f7, #f97316, #3b82f6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 8s ease infinite;
            letter-spacing: -0.01em;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin: 12px 0 20px 0;
        }

        .avatar {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.7);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: transform 0.25s, box-shadow 0.3s;
            cursor: pointer;
            background: var(--card-bg);
        }

        .avatar:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
            border-color: var(--accent-color);
        }

        .sub {
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .search-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input {
            flex: 1;
            min-width: 300px;
            padding: 16px 24px;
            font-size: 1.05rem;
            border: 1px solid var(--border-color);
            border-radius: 80px;
            background: var(--input-bg);
            backdrop-filter: blur(4px);
            color: var(--text-primary);
            outline: none;
            transition: all 0.25s;
            font-weight: 500;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(106, 169, 255, 0.25);
            background: rgba(255,255,255,0.7);
        }

        body.dark .search-input:focus {
            background: rgba(30, 41, 59, 0.9);
        }

        .search-btn {
            min-width: 140px;
            background: linear-gradient(105deg, var(--accent-color), #3b6ea0);
            color: white;
            border: none;
            border-radius: 80px;
            padding: 0 32px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .search-btn:hover {
            background: var(--accent-hover);
            transform: scale(0.97);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .stats {
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            background: var(--result-bg);
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 60px;
            display: inline-block;
            font-weight: 500;
            border: 0.5px solid var(--glass-border);
        }

        /* 灵动玻璃卡片 */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 28px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--shadow-sm);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(106, 169, 255, 0.5);
            background: rgba(255, 255, 255, 0.8);
        }

        body.dark .card:hover {
            background: rgba(30, 41, 59, 0.85);
        }

        .card-content {
            padding: 22px 26px;
        }

        .resource-title {
            font-weight: 700;
            font-size: 1.25rem;
            line-height: 1.4;
            margin-bottom: 14px;
            color: var(--text-primary);
        }

        .meta-info {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
            font-size: 0.75rem;
        }

        .badge {
            background: var(--tag-bg);
            backdrop-filter: blur(4px);
            padding: 5px 14px;
            border-radius: 40px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .password-badge {
            background: var(--password-tag);
            color: #e68a2e;
            font-weight: 600;
        }

        .note {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 14px 0;
            background: var(--result-bg);
            padding: 12px 14px;
            border-radius: 20px;
            word-break: break-word;
            border-left: 3px solid var(--accent-color);
        }

        .link-btn {
            display: block;
            background: linear-gradient(95deg, var(--accent-color), #2c5a82);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 16px;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }

        .link-btn:hover {
            background: var(--accent-hover);
            transform: scale(0.98);
        }

        .footer-info {
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.03);
            padding: 12px 22px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
        }

        body.dark .footer-info {
            background: rgba(0, 0, 0, 0.2);
        }

        .empty-state, .error-state {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 44px;
            padding: 60px 28px;
            text-align: center;
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            font-size: 1rem;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1rem;
            color: var(--accent-color);
        }

        .spinner {
            display: inline-block;
            width: 44px;
            height: 44px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 主题切换按钮玻璃质感 */
        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 101;
            transition: all 0.3s;
            box-shadow: var(--shadow-sm);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            background: rgba(106, 169, 255, 0.2);
        }

        @media (max-width: 640px) {
            .container { padding: 16px; padding-top: 92px; }
            .search-header { padding: 28px 20px; border-radius: 32px; }
            h1 { font-size: 1.7rem; }
            .search-input { min-width: 100%; }
            .search-btn { min-width: 100%; padding: 14px; }
            .results-grid { grid-template-columns: 1fr; gap: 20px; }
            .theme-toggle { top: 16px; right: 16px; width: 44px; height: 44px; }
            .avatar { width: 70px; height: 70px; }
        }
    </style>
</head>
<body>
    <!-- 跑马灯与音乐组件已完全移除，清爽专注搜索 -->
    <div class="theme-toggle" id="themeToggle">🌙</div>

    <div class="container">
        <div class="search-header">
            <h1>✨卡卡的西✨全网盘搜</h1>
            <div class="avatar-wrapper">
                <img src="https://qu.ax/Kq2QH.jpeg" 
                     alt="头像" 
                     class="avatar"
                     onerror="this.onerror=null; this.src='https://via.placeholder.com/80x80?text=Avatar'">
            </div>
            <div class="sub">⚡ 夸克专搜 · 灵动玻璃引擎 · 秒级响应</div>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="搜夸克网盘资源：短剧 / 电影 / 剧集 / 书籍 / 软件">
                <button id="searchBtn" class="search-btn">🔍 夸克极速搜</button>
            </div>
            <div id="statsArea" class="stats">✨ 只展示夸克网盘资源 · 代理加速中</div>
        </div>

        <div id="resultsContainer" class="results-grid">
            <div class="empty-state">
                🧊 灵动玻璃 · 夸克网盘专搜<br>
                ✅ 已过滤其他网盘，仅呈现夸克链接<br>
                💡 试试搜索「死神来了」「短剧」「蜜语纪」「4K电影」
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 配置 ----------
            const ORIGIN_API = 'https://so.252035.xyz/api/search?kw=';
            const PROXY_API = 'https://proxy.api.030101.xyz/';
            const USE_PROXY = true;

            function buildApiUrl(keyword) {
                const encodedKw = encodeURIComponent(keyword);
                if (USE_PROXY) {
                    return PROXY_API + ORIGIN_API + encodedKw;
                }
                return ORIGIN_API + encodedKw;
            }

            // 缓存原始数据（不过滤，保证性能）
            const cache = new Map();

            // 夸克网盘判定函数
            function isQuarkResource(url) {
                if (!url || typeof url !== 'string') return false;
                return url.includes('quark.cn') || url.includes('pan.quark.cn');
            }

            // 过滤出夸克资源
            function filterQuarkOnly(resourcesArray) {
                if (!Array.isArray(resourcesArray)) return [];
                return resourcesArray.filter(item => {
                    const url = item?.url || '';
                    return isQuarkResource(url);
                });
            }

            async function fetchWithTimeout(url, timeout = 9000, retries = 1) {
                for (let i = 0; i <= retries; i++) {
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), timeout);
                        const response = await fetch(url, { 
                            signal: controller.signal, 
                            headers: { 'Accept': 'application/json' }
                        });
                        clearTimeout(timeoutId);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        return await response.json();
                    } catch (err) {
                        if (i === retries) throw err;
                        await new Promise(r => setTimeout(r, 600));
                    }
                }
            }

            function formatDate(dateStr) {
                if (!dateStr || dateStr.startsWith('0001-01-01')) return '时间未知';
                try {
                    const date = new Date(dateStr);
                    if (isNaN(date.getTime())) return dateStr.split('T')[0];
                    return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')}`;
                } catch(e) {
                    return dateStr;
                }
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            function getQuarkBadge() {
                return '⚛️ 夸克网盘';
            }

            function renderCard(item) {
                const title = item.note || '夸克资源';
                const url = item.url || '#';
                const password = item.password || '';
                const source = item.source || '未知来源';
                const datetime = item.datetime ? formatDate(item.datetime) : '时间未知';
                const noteDetail = item.note || '';
                
                return `
                    <div class="card">
                        <div class="card-content">
                            <div class="resource-title">✨ ${escapeHtml(title)}</div>
                            <div class="meta-info">
                                <span class="badge">${getQuarkBadge()}</span>
                                <span class="badge">📅 ${datetime}</span>
                                <span class="badge">📡 ${escapeHtml(source)}</span>
                                ${password ? `<span class="badge password-badge">🔑 提取码: ${escapeHtml(password)}</span>` : ''}
                            </div>
                            ${noteDetail && noteDetail !== title ? `<div class="note">📄 ${escapeHtml(noteDetail.substring(0, 200))}${noteDetail.length > 200 ? '…' : ''}</div>` : ''}
                            <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" class="link-btn">📂 打开夸克链接 →</a>
                        </div>
                        <div class="footer-info">
                            <span>✨ 夸克专源 · ${escapeHtml(source)}</span>
                            ${password ? `<span>🔐 密码: ${escapeHtml(password)}</span>` : '<span>🔓 无密码</span>'}
                        </div>
                    </div>
                `;
            }

            function showLoading() {
                const container = document.getElementById('resultsContainer');
                container.innerHTML = `<div class="loading"><div class="spinner"></div><div style="margin-top:14px;">🪄 代理加速·检索夸克资源中</div></div>`;
            }

            function showError(msg) {
                const container = document.getElementById('resultsContainer');
                container.innerHTML = `<div class="error-state">⚠️ 请求失败: ${escapeHtml(msg)}<br><br>💡 提示: 代理服务器可能繁忙，请重试或检查网络<br>🚀 夸克专搜依然为您服务</div>`;
                const statsArea = document.getElementById('statsArea');
                if (statsArea) statsArea.innerText = `❌ 请求失败: ${msg}`;
            }

            function showEmpty(keyword, onlyQuark = true) {
                const container = document.getElementById('resultsContainer');
                container.innerHTML = `<div class="empty-state">😞 未找到关于 “${escapeHtml(keyword)}” 的夸克网盘资源<br>✨ 试试其他关键词 (例如: 短剧、死神来了、蜜语纪、4K纪录片)</div>`;
                const statsArea = document.getElementById('statsArea');
                statsArea.innerText = `🔍 未找到夸克资源 · 关键词 “${keyword}” 无结果`;
            }

            function renderQuarkResults(quarkItems, totalOriginalCount, keyword) {
                const container = document.getElementById('resultsContainer');
                container.innerHTML = '';
                if (!quarkItems.length) {
                    showEmpty(keyword);
                    return;
                }
                for (let i = 0; i < quarkItems.length; i++) {
                    container.insertAdjacentHTML('beforeend', renderCard(quarkItems[i]));
                }
                const statsDiv = document.getElementById('statsArea');
                statsDiv.innerHTML = `✅ 夸克专搜 · 找到 ${quarkItems.length} 条夸克网盘资源 · 代理加速已缓存 ✨`;
                if (quarkItems.length > 25) {
                    const tip = document.createElement('div');
                    tip.className = 'stats';
                    tip.style.marginTop = '20px';
                    tip.style.textAlign = 'center';
                    tip.style.display = 'block';
                    tip.innerText = `📦 共展示 ${quarkItems.length} 条高质量夸克资源，点击链接直接获取`;
                    container.appendChild(tip);
                }
            }

            // 核心搜索：过滤夸克
            async function searchResources(keyword) {
                if (!keyword || keyword.trim() === '') {
                    const statsArea = document.getElementById('statsArea');
                    statsArea.innerText = '⚠️ 请输入要搜索的资源名称（夸克网盘专搜）';
                    const container = document.getElementById('resultsContainer');
                    container.innerHTML = `<div class="empty-state">📌 输入电影/剧集/短剧/资料名称，秒级检索夸克网盘</div>`;
                    return;
                }
                const kw = keyword.trim();
                const statsArea = document.getElementById('statsArea');
                
                // 缓存逻辑 (缓存原始全量数据)
                let rawData = null;
                let isFromCache = false;
                if (cache.has(kw)) {
                    rawData = cache.get(kw);
                    isFromCache = true;
                    statsArea.innerHTML = `⚡ 缓存命中 · 正在过滤夸克资源 · 关键词: ${kw}`;
                } else {
                    statsArea.innerHTML = `🚀 代理加速请求中 · 夸克专搜: ${kw}`;
                    showLoading();
                }
                
                try {
                    let allResultsRaw = [];
                    let totalOriginal = 0;
                    
                    if (!isFromCache) {
                        const apiUrl = buildApiUrl(kw);
                        const data = await fetchWithTimeout(apiUrl, 9000, 1);
                        if (data.code !== 0 || !data.data) {
                            throw new Error(data.message || '接口返回异常');
                        }
                        const mergedByType = data.data.merged_by_type || {};
                        let tempResults = [];
                        for (let type in mergedByType) {
                            if (Array.isArray(mergedByType[type])) {
                                tempResults = tempResults.concat(mergedByType[type]);
                            }
                        }
                        allResultsRaw = tempResults;
                        totalOriginal = data.data.total || tempResults.length;
                        // 存入缓存（原始完整列表）
                        cache.set(kw, { allResults: allResultsRaw, total: totalOriginal });
                        if (cache.size > 55) {
                            const firstKey = cache.keys().next().value;
                            cache.delete(firstKey);
                        }
                    } else {
                        allResultsRaw = rawData.allResults;
                        totalOriginal = rawData.total;
                    }
                    
                    // 夸克过滤核心
                    const quarkOnly = filterQuarkOnly(allResultsRaw);
                    
                    if (quarkOnly.length === 0) {
                        showEmpty(kw);
                        return;
                    }
                    
                    renderQuarkResults(quarkOnly, totalOriginal, kw);
                    
                } catch (err) {
                    console.error('夸克搜索出错:', err);
                    if (err.name === 'AbortError') {
                        showError('请求超时 (9秒)，代理服务器较慢，请重试');
                    } else {
                        showError(err.message || '网络波动或代理不可用，稍后重试');
                    }
                }
            }
            
            // 预加载热门夸克词 (可选，依然只过滤夸克)
            function preloadHotKeywords() {
                const hotWords = ['短剧', '电影', '死神来了', '4K', '夸克资源'];
                if ('requestIdleCallback' in window) {
                    requestIdleCallback(() => {
                        hotWords.forEach(kw => {
                            if (!cache.has(kw)) {
                                fetchWithTimeout(buildApiUrl(kw), 10000, 0).catch(() => {});
                            }
                        });
                    });
                } else {
                    setTimeout(() => {
                        hotWords.forEach(kw => {
                            if (!cache.has(kw)) {
                                fetchWithTimeout(buildApiUrl(kw), 10000, 0).catch(() => {});
                            }
                        });
                    }, 2000);
                }
            }

            // ---------- DOM 绑定 ----------
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            
            searchBtn.addEventListener('click', () => {
                searchResources(searchInput.value);
            });
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    searchResources(searchInput.value);
                }
            });

            // 主题切换 (保持玻璃质感)
            const themeToggle = document.getElementById('themeToggle');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
                themeToggle.textContent = '☀️';
            }
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeToggle.textContent = isDark ? '☀️' : '🌙';
            });
            
            // 页面启动后预加载热门词 + 默认不再自动播放音乐（已彻底移除音乐组件）
            window.addEventListener('load', () => {
                preloadHotKeywords();
                if (localStorage.getItem('theme') === 'dark') {
                    document.body.classList.add('dark');
                    themeToggle.textContent = '☀️';
                }
                // 友好的初始提示
                const statsDiv = document.getElementById('statsArea');
                statsDiv.innerHTML = '✨ 夸克网盘专搜已就绪 · 灵动玻璃质感 · 输入关键词即得';
            });
        })();
    </script>
</body>
</html>
