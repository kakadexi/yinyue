<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>卡卡的西 · 双平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        *{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#e0eafc,#cfdef3);min-height:100vh}
        .glass{background:rgba(255,255,255,0.5);backdrop-filter:blur(20px);border-radius:32px;border:0.5px solid rgba(255,255,255,0.6)}
        .btn{background:rgba(255,255,255,0.6);border-radius:40px;padding:6px 18px;cursor:pointer}
        .active{background:white;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
        .ctrl{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.7);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
        .play{background:#5e9bff;color:white}
        .song-item{cursor:pointer;transition:.1s}
        .song-item:active{background:rgba(0,0,0,0.05)}
        .playing{background:rgba(94,155,255,0.15);border-left:3px solid #5e9bff}
        audio{width:100%;border-radius:60px;margin-top:8px}
        .loader{width:24px;height:24px;border:2px solid rgba(0,0,0,0.1);border-top-color:#5e9bff;border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div id="app" class="max-w-3xl mx-auto px-4 py-6">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-gray-800 to-blue-600 bg-clip-text text-transparent">✨卡卡的西✨</h1>
        <div class="flex gap-2 bg-white/30 rounded-full p-1">
            <span @click="switchPlatform('qq')" class="btn" :class="platform=='qq'?'active':''">QQ</span>
            <span @click="switchPlatform('netease')" class="btn" :class="platform=='netease'?'active':''">网易云</span>
        </div>
    </div>

    <div class="glass p-4 mb-5">
        <div class="relative mb-3">
            <i class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">🔍</i>
            <input v-model="keyword" @keyup.enter="search" class="w-full pl-10 pr-4 py-3 rounded-full bg-white/50 outline-none" placeholder="歌曲或歌手">
        </div>
        <div class="flex gap-2 overflow-x-auto pb-1">
            <span v-for="s in hot" :key="s" @click="keyword=s;search()" class="bg-white/40 rounded-full px-4 py-1.5 text-sm whitespace-nowrap">🎤 {{s}}</span>
        </div>
    </div>

    <div v-if="currentSong" class="glass p-4 mb-5">
        <div class="flex gap-3">
            <img :src="currentSong.cover" class="w-16 h-16 rounded-xl object-cover" @error="currentSong.cover=defaultCover">
            <div class="flex-1 min-w-0">
                <div class="text-xs text-gray-500">正在播放 · {{platform=='qq'?'QQ':'网易云'}}</div>
                <div class="font-semibold truncate">{{currentSong.name}}</div>
                <div class="text-sm text-gray-500 truncate">{{currentSong.artist}}</div>
            </div>
        </div>
        <audio ref="audio" controls @ended="next" @error="onError"></audio>
        <div class="flex justify-center gap-4 mt-2">
            <div class="ctrl" @click="prev">⏮</div>
            <div class="ctrl play" @click="togglePlay">{{isPlaying?'⏸':'▶'}}</div>
            <div class="ctrl" @click="next">⏭</div>
            <div class="ctrl" @click="cycleMode">{{modeIcon}}</div>
        </div>
    </div>

    <div class="glass overflow-hidden">
        <div class="px-4 py-2 border-b border-white/40 flex justify-between">
            <span class="font-semibold">列表</span>
            <span class="text-xs text-gray-500">{{songs.length}}首</span>
        </div>
        <div ref="listContainer" class="max-h-[500px] overflow-y-auto">
            <div v-if="loading" class="py-16 text-center"><div class="loader mx-auto"></div><p class="text-gray-500 mt-2">搜索中...</p></div>
            <div v-else-if="!songs.length && !loading" class="py-16 text-center"><p class="text-gray-500">输入关键词开始</p></div>
            <div v-else>
                <div v-for="(song,idx) in songs" :key="song.id" @click="playSong(song,idx)" class="song-item px-4 py-2 flex items-center gap-3 border-b border-white/30" :class="{'playing':currentSong && currentSong.id===song.id}">
                    <div class="w-6 text-gray-500 text-sm">{{idx+1}}</div>
                    <img :src="song.cover" class="w-10 h-10 rounded object-cover" @error="song.cover=defaultCover">
                    <div class="flex-1 min-w-0">
                        <div class="truncate">{{song.name}}</div>
                        <div class="text-xs text-gray-500 truncate">{{song.artist}}</div>
                    </div>
                    <div class="text-xs text-gray-400 hidden sm:block">{{song.duration}}</div>
                    <span class="text-gray-400 text-xs">▶</span>
                </div>
                <div class="py-3 text-center">
                    <button v-if="hasMore && !loading" @click="loadMore" class="text-sm bg-white/40 px-4 py-1 rounded-full">加载更多</button>
                </div>
            </div>
        </div>
    </div>

    <div v-if="msg" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-black/70 text-white px-4 py-2 rounded-full text-sm z-50">{{msg}}</div>
</div>

<script>
const { createApp, ref, computed, onMounted, onUnmounted, watch } = Vue;
const PROXY = 'https://proxy.api.030101.xyz/'; // CORS代理

createApp({
    setup() {
        const platform = ref('qq');
        const keyword = ref('');
        const songs = ref([]);
        const loading = ref(false);
        const isLoadingMore = ref(false);
        const currentSong = ref(null);
        const msg = ref('');
        const audio = ref(null);
        const isPlaying = ref(false);
        const playMode = ref('order'); // order, random, repeat-one
        const currentIndex = ref(-1);
        const currentPage = ref(1);
        const hasMore = ref(true);
        const pageSize = 30;
        const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';
        const hot = ['周杰伦', '林俊杰', '陈奕迅', '邓紫棋', '薛之谦', '李荣浩', '林忆莲', '王菲'];
        const listContainer = ref(null);

        const modeIcon = computed(() => playMode.value === 'random' ? '🎲' : playMode.value === 'repeat-one' ? '🔂' : '🔁');
        const showMsg = (text) => { msg.value = text; setTimeout(() => msg.value = '', 2000); };

        // 更新锁屏/灵动岛信息
        const updateMediaSession = (song) => {
            if ('mediaSession' in navigator && song) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.name,
                    artist: song.artist,
                    artwork: [{ src: song.cover, sizes: '512x512' }]
                });
                navigator.mediaSession.setActionHandler('play', () => audio.value?.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.value?.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => prev());
                navigator.mediaSession.setActionHandler('nexttrack', () => next());
            }
        };

        // ========== QQ音乐 ==========
        const searchQQ = async (query, page) => {
            const data = await axios.post(PROXY + 'https://u.y.qq.com/cgi-bin/musicu.fcg', {
                req_1: { method: "DoSearchForQQMusicDesktop", module: "music.search.SearchCgiService", param: { num_per_page: pageSize, page_num: page, query, search_type: 0 } }
            }, { headers: { 'Content-Type': 'application/json' } }).then(r => r.data);
            const list = data?.req_1?.data?.body?.song?.list || [];
            return {
                list: list.map(item => ({
                    id: item.id, mid: item.mid, name: item.name,
                    artist: item.singer?.map(s => s.name).join(', ') || '未知歌手',
                    cover: item.album?.mid ? `https://y.gtimg.cn/music/photo_new/T002R300x300M000${item.album.mid}.jpg` : defaultCover,
                    duration: item.interval ? `${Math.floor(item.interval/60)}:${String(item.interval%60).padStart(2,'0')}` : '03:30',
                    platform: 'qq'
                })),
                hasMore: list.length === pageSize
            };
        };
        const getQQUrl = (mid) => `https://music.nxinxz.com/kgqq/tx.php?id=${mid}&level=exhigh&type=mp3`;

        // ========== 网易云音乐（使用官方API + 代理，与QQ共用代理）==========
        const searchNetease = async (query, page) => {
            const offset = (page - 1) * pageSize;
            const url = `https://music.163.com/api/search/get/?s=${encodeURIComponent(query)}&type=1&offset=${offset}&limit=${pageSize}`;
            const res = await axios.get(PROXY + url, { headers: { 'User-Agent': 'Mozilla/5.0' } });
            const songsList = res.data?.result?.songs || [];
            return {
                list: songsList.map(song => ({
                    id: song.id, mid: song.id, name: song.name,
                    artist: song.artists?.map(a => a.name).join(', ') || '未知歌手',
                    cover: song.album?.picUrl || defaultCover,
                    duration: song.duration ? `${Math.floor(song.duration/60000)}:${String(Math.floor((song.duration%60000)/1000)).padStart(2,'0')}` : '03:30',
                    platform: 'netease'
                })),
                hasMore: songsList.length === pageSize
            };
        };
        const getNeteaseUrl = async (id) => {
            // 尝试第三方解析，失败则用官方外链
            try {
                const res = await axios.get(`https://api.uomg.com/api/rand.music?sort=${id}&format=json`, { timeout: 8000 });
                if (res.data?.data?.url) return res.data.data.url;
            } catch(e) {}
            return `https://music.163.com/song/media/outer/url?id=${id}.mp3`;
        };

        // 统一入口
        const searchPlatform = (query, page) => platform.value === 'qq' ? searchQQ(query, page) : searchNetease(query, page);
        const getPlayUrl = (song) => song.platform === 'qq' ? getQQUrl(song.mid) : getNeteaseUrl(song.id);

        // 播放核心
        const playTrack = async (song, idx) => {
            if (!song) return;
            currentSong.value = song;
            currentIndex.value = idx;
            updateMediaSession(song);
            const url = await getPlayUrl(song);
            if (audio.value) {
                audio.value.src = url;
                audio.value.load();
                try {
                    await audio.value.play();
                    isPlaying.value = true;
                } catch (err) {
                    showMsg(`⚠️ 播放失败: ${song.name}，自动跳过`);
                    setTimeout(() => next(), 100);
                }
            }
            showMsg(`🎵 ${song.name}`);
        };

        const getNextIndex = () => {
            if (!songs.value.length) return -1;
            if (playMode.value === 'random') {
                let newIdx = Math.floor(Math.random() * songs.value.length);
                while (newIdx === currentIndex.value && songs.value.length > 1) newIdx = Math.floor(Math.random() * songs.value.length);
                return newIdx;
            } else if (playMode.value === 'repeat-one') return currentIndex.value;
            return (currentIndex.value + 1) % songs.value.length;
        };

        const next = async () => {
            if (!songs.value.length) return;
            if (playMode.value === 'repeat-one') {
                if (audio.value && currentSong.value) { audio.value.currentTime = 0; audio.value.play(); }
                return;
            }
            const idx = getNextIndex();
            if (idx !== -1) await playTrack(songs.value[idx], idx);
        };

        const prev = async () => {
            if (!songs.value.length) return;
            let idx;
            if (playMode.value === 'random') idx = Math.floor(Math.random() * songs.value.length);
            else if (playMode.value === 'repeat-one') idx = currentIndex.value;
            else idx = (currentIndex.value - 1 + songs.value.length) % songs.value.length;
            if (idx !== -1) await playTrack(songs.value[idx], idx);
        };

        const togglePlay = () => {
            if (!audio.value) return;
            if (isPlaying.value) audio.value.pause();
            else audio.value.play();
        };
        const onError = () => { showMsg('播放出错，跳过'); next(); };
        const cycleMode = () => {
            if (playMode.value === 'order') playMode.value = 'random';
            else if (playMode.value === 'random') playMode.value = 'repeat-one';
            else playMode.value = 'order';
            showMsg(`模式: ${playMode.value === 'order' ? '顺序' : playMode.value === 'random' ? '随机' : '单曲循环'}`);
        };
        const playSong = (song, idx) => playTrack(song, idx);

        // 搜索主逻辑
        const search = async () => {
            if (!keyword.value.trim()) { showMsg('输入歌手或歌曲'); return; }
            loading.value = true;
            currentPage.value = 1;
            songs.value = [];
            try {
                const { list, hasMore: more } = await searchPlatform(keyword.value, 1);
                songs.value = list;
                hasMore.value = more;
                showMsg(list.length ? `找到 ${list.length} 首` : '未找到');
                if (list.length) currentPage.value = 2;
            } catch(e) { showMsg('搜索失败'); }
            loading.value = false;
        };

        const loadMore = async () => {
            if (isLoadingMore.value || !hasMore.value || loading.value) return;
            isLoadingMore.value = true;
            try {
                const { list, hasMore: more } = await searchPlatform(keyword.value, currentPage.value);
                songs.value = [...songs.value, ...list];
                hasMore.value = more;
                if (list.length) currentPage.value++;
            } catch(e) { showMsg('加载更多失败'); }
            isLoadingMore.value = false;
        };

        const switchPlatform = (plat) => {
            if (platform.value === plat) return;
            platform.value = plat;
            songs.value = [];
            currentSong.value = null;
            if (audio.value) audio.value.pause();
            keyword.value = '';
            showMsg(`切换到${plat === 'qq' ? 'QQ音乐' : '网易云'}`);
        };

        const handleScroll = () => {
            if (!listContainer.value) return;
            const { scrollTop, clientHeight, scrollHeight } = listContainer.value;
            if (scrollTop + clientHeight >= scrollHeight - 100 && hasMore.value && !isLoadingMore.value && !loading.value && keyword.value.trim())
                loadMore();
        };

        onMounted(() => {
            if (listContainer.value) listContainer.value.addEventListener('scroll', handleScroll);
            if (audio.value) {
                audio.value.addEventListener('play', () => isPlaying.value = true);
                audio.value.addEventListener('pause', () => isPlaying.value = false);
            }
        });
        onUnmounted(() => {
            if (listContainer.value) listContainer.value.removeEventListener('scroll', handleScroll);
        });
        watch(audio, (val) => {
            if (val) {
                val.addEventListener('play', () => isPlaying.value = true);
                val.addEventListener('pause', () => isPlaying.value = false);
            }
        });

        return {
            platform, keyword, songs, loading, isLoadingMore, currentSong, msg, audio, isPlaying,
            playMode, modeIcon, currentIndex, hasMore, defaultCover, hot, listContainer,
            switchPlatform, search, loadMore, playSong, togglePlay, next, prev, cycleMode, onError
        };
    }
}).mount('#app');
</script>
</body>
</html>
